<!DOCTYPE html>
<html>
<head>
    <title>VM Setup Commands</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #d4d4d4; }
        pre { background: #2d2d2d; padding: 15px; border-radius: 5px; font-size: 16px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>Run these commands in VM terminal:</h2>
    <pre id="commands">mkdir -p ~/.ssh
chmod 700 ~/.ssh
echo "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDbaKyg1yPB+f3jGRkLPMTDGXvP8VT19hFoUa7E1LgrA deacyde@fedora" >> ~/.ssh/authorized_keys
chmod 600 ~/.ssh/authorized_keys</pre>
    <button onclick="navigator.clipboard.writeText(document.getElementById('commands').textContent)">Copy Commands</button>
    <p>After running these, tell me and I'll delete this page.</p>
</body>
</html>
