<!DOCTYPE html>
<html>
<head>
    <title>Paste Output</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #d4d4d4; }
        textarea { width: 100%; height: 200px; background: #2d2d2d; color: #d4d4d4; font-family: monospace; padding: 10px; font-size: 14px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        #output { background: #2d2d2d; padding: 15px; margin-top: 20px; white-space: pre-wrap; display: none; }
    </style>
</head>
<body>
    <h2>Paste the command output here:</h2>
    <textarea id="input" placeholder="Paste output from VM terminal..."></textarea>
    <button onclick="show()">Submit</button>
    <div id="output"></div>
    <script>
        function show() {
            document.getElementById('output').textContent = document.getElementById('input').value;
            document.getElementById('output').style.display = 'block';
            document.getElementById('input').style.display = 'none';
            document.querySelector('button').style.display = 'none';
        }
    </script>
</body>
</html>
