<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Bridge Out</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: #0d0d1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
    }

    /* SKY */
    .sky {
      position: fixed; inset: 0;
      background: linear-gradient(180deg, #0d0d1a 0%, #1a1a3e 45%, #2d1b4e 72%, #1a3a5c 88%, #0a2030 100%);
      z-index: 0;
    }

    /* STARS */
    .stars { position:fixed; inset:0; z-index:1; }
    .star {
      position:absolute; background:#fff; border-radius:50%;
      animation: twinkle 2s infinite alternate;
    }
    @keyframes twinkle {
      from { opacity:0.15; } to { opacity:1; }
    }

    /* MOON */
    .moon { position:fixed; top:7%; right:11%; width:52px; height:52px; z-index:2; image-rendering:pixelated; }

    /* CITY — pushed up, sits above bridge */
    .city {
      position:fixed;
      bottom: 42%;   /* sits above bridge */
      left:0; width:100%; height:130px;
      z-index:3;
    }

    /* BRIDGE — sits at ~30% from bottom */
    .bridge-wrap {
      position:fixed;
      bottom: 28%;
      left:0; width:100%; height:22px;
      z-index:6;
      display:flex;
      align-items:flex-end;
    }

    /* Left intact half */
    .bridge-left {
      width: 58%;
      height: 20px;
      background: #3a3a3a;
      border-top: 3px solid #555;
      border-right: none;
      flex-shrink:0;
      position:relative;
    }
    /* Jagged broken edge */
    .bridge-left::after {
      content:'';
      position:absolute;
      right:-14px; top:-3px;
      width:14px; height:23px;
      background: linear-gradient(to bottom right, #3a3a3a 50%, transparent 50%);
      clip-path: polygon(0 0, 100% 0, 100% 30%, 70% 60%, 100% 80%, 60% 100%, 0 100%);
    }
    /* Road markings on bridge */
    .bridge-road-lines {
      position:absolute; top:6px; left:0; width:100%; height:5px;
      overflow:hidden;
    }
    .brl { position:absolute; width:50px; height:4px; background:#f5c518; animation: roadScroll 0.55s linear infinite; }
    @keyframes roadScroll { from{transform:translateX(0)} to{transform:translateX(-70px)} }

    /* CABLES */
    .cables {
      position:fixed;
      bottom: calc(28% + 20px);
      left:0; width:58%; height:130px;
      z-index:5;
      pointer-events:none;
    }

    /* CONSTRUCTION SIGN at broken edge */
    .sign {
      position:fixed;
      bottom: calc(28% + 20px);
      left: 56%;
      z-index:10;
      text-align:center;
      animation: signBob 1.1s ease-in-out infinite alternate;
    }
    .sign .board {
      background:#f5c518; border:3px solid #111;
      padding:5px 8px; font-size:6px; color:#111; line-height:1.8;
    }
    .sign .post { width:5px; height:28px; background:#aaa; margin:0 auto; }
    @keyframes signBob {
      from { transform:rotate(-3deg); } to { transform:rotate(3deg); }
    }

    /* WORKERS */
    .worker {
      position:fixed;
      bottom: calc(28% + 20px);
      z-index:11; image-rendering:pixelated;
    }
    .worker-a { left:48%; }
    .worker-b { left:52%; animation-delay:0.25s; }

    /* WATER at bottom */
    .water {
      position:fixed;
      bottom:0; left:0; width:100%; height:27%;
      z-index:4;
      background: linear-gradient(180deg, #0a2a45 0%, #0d3d66 40%, #0a2a45 100%);
      overflow:hidden;
    }
    .wave {
      position:absolute; top:0; left:-200px;
      width:calc(100% + 400px); height:40px;
      background: rgba(30,100,160,0.5);
      border-radius:50%;
      animation: wave linear infinite;
    }
    .wave1 { animation-duration:4s; top:4px; }
    .wave2 { animation-duration:6s; top:14px; opacity:0.6; animation-direction:reverse; }
    .wave3 { animation-duration:8s; top:24px; opacity:0.4; }
    @keyframes wave {
      from { transform:translateX(0) scaleY(1); }
      50%  { transform:translateX(80px) scaleY(1.3); }
      to   { transform:translateX(0) scaleY(1); }
    }

    /* CAR LAYER */
    .car-layer {
      position:fixed; bottom:0; left:0; width:100%; height:100%;
      z-index:8; pointer-events:none; overflow:hidden;
    }
    .car {
      position:absolute;
      image-rendering:pixelated;
    }

    /* SPLASH */
    .splash {
      position:absolute;
      font-size:22px;
      z-index:12;
      pointer-events:none;
      animation: splashAnim 0.9s ease-out forwards;
    }
    @keyframes splashAnim {
      0%   { transform:scale(0.4); opacity:1; }
      50%  { transform:scale(1.5); opacity:1; }
      100% { transform:scale(2); opacity:0; }
    }

    /* UI TEXT */
    .ui {
      position:relative; z-index:20;
      text-align:center;
      margin-bottom: 34%;
      padding:0 16px;
    }
    .error-code {
      font-size: clamp(48px, 9vw, 76px);
      color:#f5c518;
      text-shadow: 4px 4px 0 #a8860f, -2px -2px 0 #000;
      animation: glitch 3.5s infinite;
      letter-spacing:4px;
    }
    @keyframes glitch {
      0%,88%,100% { text-shadow:4px 4px 0 #a8860f,-2px -2px 0 #000; transform:none; }
      90% { transform:translateX(-3px); text-shadow:4px 4px 0 #f00,-2px -2px 0 #0ff; }
      92% { transform:translateX(3px);  text-shadow:4px 4px 0 #0ff,-2px -2px 0 #f00; }
      94% { transform:none; }
    }
    .subtitle { font-size:clamp(6px,1.4vw,9px); color:#bbb; margin-top:16px; line-height:2.2; }
    .home-btn {
      display:inline-block; margin-top:24px; padding:11px 22px;
      background:#f5c518; color:#111;
      font-family:'Press Start 2P',monospace; font-size:7px;
      text-decoration:none; border:3px solid #111; box-shadow:4px 4px 0 #000;
      transition:transform 0.1s,box-shadow 0.1s;
    }
    .home-btn:hover { transform:translate(2px,2px); box-shadow:2px 2px 0 #000; }
  </style>
</head>
<body>

<div class="sky"></div>
<div class="stars" id="stars"></div>

<!-- Moon -->
<svg class="moon" viewBox="0 0 14 14" xmlns="http://www.w3.org/2000/svg">
  <rect x="4" y="0" width="6" height="2" fill="#ffffcc"/>
  <rect x="2" y="2" width="10" height="2" fill="#ffffcc"/>

</svg>

<!-- City skyline -->

  <rect x="298"  y="36"  width="22"  height="94"  fill="#0e0e22"/>
  <rect x="365"  y="48"  width="58"  height="82"  fill="#0e0e22"/>
  <rect x="382"  y="22"  width="24"  height="108" fill="#0e0e22"/>
  <rect x="450"  y="58"  width="42"  height="72"  fill="#0e0e22"/>
  <rect x="510"  y="52"  width="52"  height="78"  fill="#0e0e22"/>
  <rect x="526"  y="28"  width="20"  height="102" fill="#0e0e22"/>
  <rect x="590"  y="68"  width="38"  height="62"  fill="#0e0e22"/>
  <rect x="648"  y="48"  width="56"  height="82"  fill="#0e0e22"/>
  <rect x="664"  y="24"  width="24"  height="106" fill="#0e0e22"/>
  <rect x="730"  y="58"  width="44"  height="72"  fill="#0e0e22"/>
  <rect x="800"  y="42"  width="52"  height="88"  fill="#0e0e22"/>
  <rect x="816"  y="18"  width="20"  height="112" fill="#0e0e22"/>
  <rect x="880"  y="62"  width="42"  height="68"  fill="#0e0e22"/>
  <rect x="945"  y="48"  width="56"  height="82"  fill="#0e0e22"/>
  <rect x="962"  y="22"  width="22"  height="108" fill="#0e0e22"/>
  <rect x="1028" y="58"  width="42"  height="72"  fill="#0e0e22"/>
  <rect x="1090" y="42"  width="52"  height="88"  fill="#0e0e22"/>
  <rect x="1106" y="15"  width="20"  height="115" fill="#0e0e22"/>
  <rect x="1160" y="52"  width="40"  height="78"  fill="#0e0e22"/>
  <!-- lit windows -->
  <rect x="12"  y="28"  width="4" height="4" fill="#f5c518" opacity="0.7"/>
  <rect x="20"  y="40"  width="4" height="4" fill="#f5c518" opacity="0.5"/>
  <rect x="70"  y="40"  width="4" height="4" fill="#f5c518" opacity="0.8"/>
  <rect x="78"  y="54"  width="4" height="4" fill="#f5c518" opacity="0.5"/>
  <rect x="214" y="36"  width="4" height="4" fill="#f5c518" opacity="0.7"/>
  <rect x="222" y="50"  width="4" height="4" fill="#f5c518" opacity="0.9"/>
  <rect x="384" y="30"  width="4" height="4" fill="#f5c518" opacity="0.8"/>
  <rect x="528" y="36"  width="4" height="4" fill="#f5c518" opacity="0.7"/>
  <rect x="666" y="32"  width="4" height="4" fill="#f5c518" opacity="0.8"/>
  <rect x="818" y="26"  width="4" height="4" fill="#f5c518" opacity="0.9"/>
  <rect x="964" y="30"  width="4" height="4" fill="#f5c518" opacity="0.8"/>
  <rect x="1108" y="23" width="4" height="4" fill="#f5c518" opacity="0.6"/>
</svg>

<!-- Bridge cables (left side only) -->
<svg class="cables" viewBox="0 0 700 130" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <rect x="230" y="0" width="10" height="130" fill="#555"/>
  <path d="M 0 25 Q 240 115 696 120" stroke="#888" stroke-width="3" fill="none"/>
  <line x1="80"  y1="52"  x2="80"  y2="130" stroke="#666" stroke-width="1.5"/>
  <line x1="145" y1="68"  x2="145" y2="130" stroke="#666" stroke-width="1.5"/>
  <line x1="210" y1="82"  x2="210" y2="130" stroke="#666" stroke-width="1.5"/>
  <line x1="330" y1="92"  x2="330" y2="130" stroke="#666" stroke-width="1.5"/>
  <line x1="430" y1="100" x2="430" y2="130" stroke="#666" stroke-width="1.5"/>
  <line x1="530" y1="108" x2="530" y2="130" stroke="#666" stroke-width="1.5"/>
  <line x1="630" y1="114" x2="630" y2="130" stroke="#666" stroke-width="1.5"/>
</svg>

<!-- Bridge deck (left half only, broken edge right side) -->
<div class="bridge-wrap">
  <div class="bridge-left" id="bridgeLeft">
    <div class="bridge-road-lines" id="roadLines"></div>
  </div>
</div>

<!-- Construction sign at broken edge -->
<div class="sign" id="signEl">
  <div class="board">⚠ BRIDGE OUT ⚠<br>404 NOT FOUND</div>
  <div class="post"></div>
</div>

<!-- Workers -->
<svg class="worker worker-a" width="16" height="24" viewBox="0 0 8 12">
  <rect x="2" y="0" width="4" height="3" fill="#f5c518"/>
  <rect x="1" y="1" width="6" height="2" fill="#e6a800"/>
  <rect x="2" y="3" width="4" height="4" fill="#ff6b35"/>
  <rect x="0" y="4" width="2" height="3" fill="#ff6b35"/>
  <rect x="6" y="4" width="2" height="3" fill="#ff6b35"/>
  <rect x="2" y="7" width="2" height="5" fill="#333"/>
  <rect x="4" y="7" width="2" height="5" fill="#444"/>
  <rect x="6" y="6" width="3" height="2" fill="#888"/>
</svg>
<svg class="worker worker-b" width="16" height="24" viewBox="0 0 8 12">
  <rect x="2" y="0" width="4" height="3" fill="#f5c518"/>
  <rect x="1" y="1" width="6" height="2" fill="#e6a800"/>
  <rect x="2" y="3" width="4" height="4" fill="#e55"/>
  <rect x="0" y="4" width="2" height="3" fill="#e55"/>
  <rect x="6" y="4" width="2" height="3" fill="#e55"/>
  <rect x="2" y="7" width="2" height="5" fill="#333"/>
  <rect x="4" y="7" width="2" height="5" fill="#444"/>
  <rect x="-1" y="6" width="3" height="2" fill="#888"/>
</svg>

<!-- Water -->
<div class="water">
  <div class="wave wave1"></div>
  <div class="wave wave2"></div>
  <div class="wave wave3"></div>
</div>

<!-- Cars rendered here by JS -->
<div class="car-layer" id="carLayer"></div>

<!-- UI -->
<div class="ui">
  <div class="error-code">404</div>
  <div class="subtitle">PAGE NOT FOUND<br><br>THIS ROAD ENDS HERE</div>
  <a class="home-btn" href="/">← GO HOME</a>
</div>

<script>
  // ── Stars ──
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 130; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() < 0.18 ? 2 : 1;
    s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*60}%;left:${Math.random()*100}%;animation-delay:${Math.random()*2}s;animation-duration:${1.5+Math.random()*2}s`;
    starsEl.appendChild(s);
  }

  // ── Road dashes on bridge ──
  const rl = document.getElementById('roadLines');
  for (let i = 0; i < 20; i++) {
    const d = document.createElement('div');
    d.className = 'brl';
    d.style.left = (i * 70) + 'px';
    d.style.top = '5px';
    d.style.animationDelay = (-i * 0.08) + 's';
    rl.appendChild(d);
  }

  // ── Car SVGs ──
  const carSVGs = [
    // red
    `<svg width="44" height="18" viewBox="0 0 22 9" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated">
      <rect x="1" y="4" width="20" height="4" fill="#c0392b"/>
      <rect x="4" y="1" width="12" height="4" fill="#e74c3c"/>
      <rect x="5" y="2" width="4" height="3" fill="#85c1e9" opacity="0.85"/>
      <rect x="11" y="2" width="4" height="3" fill="#85c1e9" opacity="0.85"/>
      <rect x="0" y="5" width="3" height="3" fill="#f9ca24"/>
      <rect x="19" y="5" width="3" height="3" fill="#c0392b" opacity="0.5"/>
      <rect x="3" y="7" width="4" height="4" fill="#111"/>
      <rect x="15" y="7" width="4" height="4" fill="#111"/>
      <rect x="4" y="8" width="2" height="2" fill="#777"/>
      <rect x="16" y="8" width="2" height="2" fill="#777"/>
    </svg>`,
    // blue
    `<svg width="44" height="18" viewBox="0 0 22 9" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated">
      <rect x="1" y="4" width="20" height="4" fill="#1a5276"/>
      <rect x="4" y="1" width="12" height="4" fill="#2e86c1"/>
      <rect x="5" y="2" width="4" height="3" fill="#85c1e9" opacity="0.85"/>
      <rect x="11" y="2" width="4" height="3" fill="#85c1e9" opacity="0.85"/>
      <rect x="0" y="5" width="3" height="3" fill="#f9ca24"/>
      <rect x="19" y="5" width="3" height="3" fill="#c0392b" opacity="0.5"/>
      <rect x="3" y="7" width="4" height="4" fill="#111"/>
      <rect x="15" y="7" width="4" height="4" fill="#111"/>
      <rect x="4" y="8" width="2" height="2" fill="#777"/>
      <rect x="16" y="8" width="2" height="2" fill="#777"/>
    </svg>`,
    // yellow taxi
    `<svg width="44" height="18" viewBox="0 0 22 9" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated">
      <rect x="1" y="4" width="20" height="4" fill="#d4ac0d"/>
      <rect x="4" y="1" width="12" height="4" fill="#f5c518"/>
      <rect x="5" y="2" width="4" height="3" fill="#85c1e9" opacity="0.85"/>
      <rect x="11" y="2" width="4" height="3" fill="#85c1e9" opacity="0.85"/>
      <rect x="8" y="0" width="5" height="2" fill="#111"/>
      <rect x="0" y="5" width="3" height="3" fill="#f9ca24"/>
      <rect x="19" y="5" width="3" height="3" fill="#c0392b" opacity="0.5"/>
      <rect x="3" y="7" width="4" height="4" fill="#111"/>
      <rect x="15" y="7" width="4" height="4" fill="#111"/>
      <rect x="4" y="8" width="2" height="2" fill="#777"/>
      <rect x="16" y="8" width="2" height="2" fill="#777"/>
    </svg>`,
    // green
    `<svg width="44" height="18" viewBox="0 0 22 9" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated">
      <rect x="1" y="4" width="20" height="4" fill="#1e8449"/>
      <rect x="4" y="1" width="12" height="4" fill="#27ae60"/>
      <rect x="5" y="2" width="4" height="3" fill="#85c1e9" opacity="0.85"/>
      <rect x="11" y="2" width="4" height="3" fill="#85c1e9" opacity="0.85"/>
      <rect x="0" y="5" width="3" height="3" fill="#f9ca24"/>
      <rect x="19" y="5" width="3" height="3" fill="#c0392b" opacity="0.5"/>
      <rect x="3" y="7" width="4" height="4" fill="#111"/>
      <rect x="15" y="7" width="4" height="4" fill="#111"/>
      <rect x="4" y="8" width="2" height="2" fill="#777"/>
      <rect x="16" y="8" width="2" height="2" fill="#777"/>
    </svg>`,
  ];

  const layer = document.getElementById('carLayer');

  // Get bridge edge X position in viewport
  function getBridgeEdgeX() {
    const bridge = document.getElementById('bridgeLeft');
    const rect = bridge.getBoundingClientRect();
    return rect.right;
  }

  // Get bridge Y position
  function getBridgeY() {
    const bridge = document.getElementById('bridgeLeft');
    const rect = bridge.getBoundingClientRect();
    return rect.top;
  }

  // Get water surface Y
  function getWaterY() {
    return window.innerHeight * 0.73;
  }

  function spawnCar() {
    const svgStr = carSVGs[Math.floor(Math.random() * carSVGs.length)];
    const speed  = 2.8 + Math.random() * 2.2; // seconds to cross full screen
    const carH   = 18;

    const edgeX   = getBridgeEdgeX();
    const bridgeY = getBridgeY();

    const car = document.createElement('div');
    car.className = 'car';
    car.innerHTML = svgStr;
    car.style.left = '-60px';
    car.style.top  = (bridgeY - carH + 4) + 'px';
    layer.appendChild(car);

    const vw           = window.innerWidth;
    const totalDrivePx = edgeX + 60;           // px from start to edge
    const driveTimeMs  = speed * 1000 * (totalDrivePx / vw); // proportional time
    const vx           = totalDrivePx / driveTimeMs; // px/ms — constant horizontal velocity

    const startTime = performance.now();

    function driveTick(now) {
      const elapsed = now - startTime;
      if (elapsed >= driveTimeMs) {
        // Hand off to fall with exact same vx
        startFall(car, edgeX, bridgeY - carH + 4, vx);
        return;
      }
      car.style.left = (-60 + vx * elapsed) + 'px';
      requestAnimationFrame(driveTick);
    }
    requestAnimationFrame(driveTick);
  }

  function startFall(car, startX, startY, vx) {
    // Real projectile physics: constant vx, vy starts at 0 and accelerates
    const gravity   = 0.00055; // px/ms^2  — tune for feel
    const waterY    = getWaterY();
    const startTime = performance.now();
    let   vy        = 0;
    let   prevTime  = startTime;
    let   x         = startX;
    let   y         = startY;

    function fallTick(now) {
      const dt = now - prevTime;
      prevTime = now;

      vy += gravity * dt;   // gravity accelerates downward
      x  += vx * dt;        // constant forward momentum
      y  += vy * dt;

      // Nose-down rotation based on vertical vs horizontal velocity ratio
      const angle = Math.atan2(vy, vx) * (180 / Math.PI);
      car.style.left      = x + 'px';
      car.style.top       = y + 'px';
      car.style.transform = `rotate(${angle}deg)`;

      if (y >= waterY) {
        spawnSplash(x, waterY);
        car.remove();
        return;
      }
      requestAnimationFrame(fallTick);
    }
    requestAnimationFrame(fallTick);
  }

  function spawnSplash(x, y) {
    const emojis = ['💦','🌊','💧','😱','💥'];
    const e = document.createElement('div');
    e.className = 'splash';
    e.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    e.style.left = (x - 14) + 'px';
    e.style.top  = (y - 14) + 'px';
    layer.appendChild(e);
    setTimeout(() => e.remove(), 950);
  }

  // Continuous car spawning
  function scheduleNext() {
    const delay = 900 + Math.random() * 1800;
    setTimeout(() => { spawnCar(); scheduleNext(); }, delay);
  }

  // Initial cars
  setTimeout(() => spawnCar(), 400);
  setTimeout(() => spawnCar(), 1200);
  scheduleNext();
</script>
</body>
</html>
