<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Under Construction</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
    }

    /* ── SKY ── */
    .sky {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, #0d0d1a 0%, #1a1a3e 40%, #2d1b4e 70%, #3d2244 100%);
      z-index: 0;
    }

    /* ── STARS ── */
    .stars {
      position: fixed;
      inset: 0;
      z-index: 1;
    }
    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle 2s infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.2; }
      to   { opacity: 1; }
    }

    /* ── MOON ── */
    .moon {
      position: fixed;
      top: 8%;
      right: 12%;
      width: 56px;
      height: 56px;
      z-index: 2;
      image-rendering: pixelated;
    }

    /* ── CITY SILHOUETTE ── */
    .city {
      position: fixed;
      bottom: 180px;
      left: 0;
      width: 100%;
      height: 120px;
      z-index: 3;
    }

    /* ── BRIDGE ── */
    .bridge-wrap {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 220px;
      z-index: 4;
    }

    /* ── ROAD / GROUND ── */
    .ground {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60px;
      background: #1c1c1c;
      z-index: 5;
    }
    .road-line {
      position: absolute;
      top: 28px;
      height: 5px;
      width: 60px;
      background: #f5c518;
      animation: roadScroll 0.6s linear infinite;
    }

    @keyframes roadScroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-80px); }
    }

    /* ── BRIDGE DECK ── */
    .bridge-deck {
      position: fixed;
      bottom: 60px;
      left: 0;
      width: 100%;
      height: 18px;
      z-index: 6;
      display: flex;
    }
    .bridge-segment {
      flex: 1;
      height: 18px;
      background: #3a3a3a;
      border-top: 3px solid #555;
      border-right: 1px solid #222;
    }
    /* Gap in the middle — the missing section */
    .bridge-gap {
      flex: 0 0 180px;
      height: 18px;
      background: transparent;
    }

    /* ── BRIDGE CABLES ── */
    .cables {
      position: fixed;
      bottom: 78px;
      left: 0;
      width: 100%;
      height: 120px;
      z-index: 6;
      pointer-events: none;
    }

    /* ── CONSTRUCTION SIGN ── */
    .construction-sign {
      position: fixed;
      bottom: 78px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      text-align: center;
      animation: signBob 1s ease-in-out infinite alternate;
    }
    .construction-sign .sign-post {
      width: 6px;
      height: 36px;
      background: #aaa;
      margin: 0 auto;
    }
    .construction-sign .sign-board {
      background: #f5c518;
      border: 3px solid #111;
      padding: 6px 10px;
      font-size: 7px;
      color: #111;
      white-space: nowrap;
      line-height: 1.6;
    }

    @keyframes signBob {
      from { transform: translateX(-50%) rotate(-2deg); }
      to   { transform: translateX(-50%) rotate(2deg); }
    }

    /* ── WORKER ── */
    .worker {
      position: fixed;
      bottom: 78px;
      z-index: 11;
      image-rendering: pixelated;
      animation: workerWalk 0.5s steps(2) infinite;
    }
    .worker-left  { left:  calc(50% - 120px); }
    .worker-right { right: calc(50% - 120px); }

    @keyframes workerWalk {
      0%   { transform: scaleX(1); }
      50%  { transform: scaleX(-1); }
      100% { transform: scaleX(1); }
    }

    /* ── CARS ── */
    .car-lane {
      position: fixed;
      bottom: 63px;
      width: 100%;
      height: 18px;
      z-index: 9;
      overflow: hidden;
    }

    .car {
      position: absolute;
      bottom: 0;
      image-rendering: pixelated;
      animation: drive linear infinite;
    }

    .car.falling {
      animation: driveAndFall linear forwards;
    }

    @keyframes drive {
      from { transform: translateX(-120px); }
      to   { transform: translateX(110vw); }
    }

    @keyframes driveAndFall {
      0%   { transform: translateX(var(--start-x)) translateY(0) rotate(0deg);   opacity: 1; }
      60%  { transform: translateX(var(--gap-x))   translateY(0) rotate(0deg);   opacity: 1; }
      75%  { transform: translateX(var(--gap-x))   translateY(0) rotate(-5deg);  opacity: 1; }
      100% { transform: translateX(calc(var(--gap-x) + 40px)) translateY(300px) rotate(-80deg); opacity: 0; }
    }

    /* ── UI OVERLAY ── */
    .ui {
      position: relative;
      z-index: 20;
      text-align: center;
      margin-bottom: 260px;
      padding: 0 16px;
    }

    .error-code {
      font-size: clamp(48px, 10vw, 80px);
      color: #f5c518;
      text-shadow: 4px 4px 0 #a8860f, -2px -2px 0 #000;
      animation: glitch 3s infinite;
      letter-spacing: 4px;
    }

    @keyframes glitch {
      0%, 90%, 100% { text-shadow: 4px 4px 0 #a8860f, -2px -2px 0 #000; transform: none; }
      92% { transform: translateX(-3px); text-shadow: 4px 4px 0 #f00, -2px -2px 0 #0ff; }
      94% { transform: translateX(3px);  text-shadow: 4px 4px 0 #0ff, -2px -2px 0 #f00; }
      96% { transform: none; }
    }

    .subtitle {
      font-size: clamp(7px, 1.5vw, 10px);
      color: #ccc;
      margin-top: 18px;
      line-height: 2;
    }

    .home-btn {
      display: inline-block;
      margin-top: 28px;
      padding: 12px 24px;
      background: #f5c518;
      color: #111;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      text-decoration: none;
      border: 3px solid #111;
      box-shadow: 4px 4px 0 #000;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .home-btn:hover {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 #000;
    }

    /* ── EXPLOSION ── */
    .explosion {
      position: fixed;
      z-index: 15;
      pointer-events: none;
      font-size: 28px;
      animation: explode 0.8s ease-out forwards;
      display: none;
    }
    @keyframes explode {
      0%   { transform: scale(0.3); opacity: 1; }
      60%  { transform: scale(1.6); opacity: 1; }
      100% { transform: scale(2);   opacity: 0; }
    }
  </style>
</head>

<!-- Explosions container -->

<script>
  // ── Stars ──
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() < 0.2 ? 2 : 1;
    s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*65}%;left:${Math.random()*100}%;animation-delay:${Math.random()*2}s;animation-duration:${1.5+Math.random()*2}s`;
    starsEl.appendChild(s);
  }

  // ── Road dashes ──
  const roadLines = document.getElementById('roadLines');
  for (let i = 0; i < 25; i++) {
    const d = document.createElement('div');
    d.className = 'road-line';
    d.style.left = (i * 80) + 'px';
    d.style.animationDelay = (-i * 0.1) + 's';
    roadLines.appendChild(d);
  }

  // ── Car pixel SVGs ──
  const carSVGs = [
    // red car
    `<svg width="48" height="20" viewBox="0 0 24 10" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated">
      <rect x="2"  y="4" width="20" height="5" fill="#c0392b"/>
      <rect x="5"  y="1" width="12" height="4" fill="#e74c3c"/>
      <rect x="6"  y="2" width="4"  height="3" fill="#85c1e9" opacity="0.9"/>
      <rect x="12" y="2" width="4"  height="3" fill="#85c1e9" opacity="0.9"/>
      <rect x="0"  y="6" width="3"  height="3" fill="#f39c12"/>
      <rect x="21" y="6" width="3"  height="3" fill="#e74c3c" opacity="0.6"/>
      <rect x="4"  y="8" width="4"  height="4" fill="#222" rx="2"/>
      <rect x="16" y="8" width="4"  height="4" fill="#222" rx="2"/>
      <rect x="5"  y="9" width="2"  height="2" fill="#888"/>
      <rect x="17" y="9" width="2"  height="2" fill="#888"/>
    </svg>`,
    // blue car
    `<svg width="48" height="20" viewBox="0 0 24 10" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated">
      <rect x="2"  y="4" width="20" height="5" fill="#2471a3"/>
      <rect x="5"  y="1" width="12" height="4" fill="#2e86c1"/>
      <rect x="6"  y="2" width="4"  height="3" fill="#85c1e9" opacity="0.9"/>
      <rect x="12" y="2" width="4"  height="3" fill="#85c1e9" opacity="0.9"/>
      <rect x="0"  y="6" width="3"  height="3" fill="#f39c12"/>
      <rect x="21" y="6" width="3"  height="3" fill="#c0392b" opacity="0.6"/>
      <rect x="4"  y="8" width="4"  height="4" fill="#222"/>
      <rect x="16" y="8" width="4"  height="4" fill="#222"/>
      <rect x="5"  y="9" width="2"  height="2" fill="#888"/>
      <rect x="17" y="9" width="2"  height="2" fill="#888"/>
    </svg>`,
    // yellow taxi
    `<svg width="48" height="20" viewBox="0 0 24 10" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated">
      <rect x="2"  y="4" width="20" height="5" fill="#d4ac0d"/>
      <rect x="5"  y="1" width="12" height="4" fill="#f5c518"/>
      <rect x="6"  y="2" width="4"  height="3" fill="#85c1e9" opacity="0.9"/>
      <rect x="12" y="2" width="4"  height="3" fill="#85c1e9" opacity="0.9"/>
      <rect x="0"  y="6" width="3"  height="3" fill="#f39c12"/>
      <rect x="21" y="6" width="3"  height="3" fill="#c0392b" opacity="0.6"/>
      <rect x="9"  y="0" width="6"  height="2" fill="#111"/>
      <rect x="4"  y="8" width="4"  height="4" fill="#222"/>
      <rect x="16" y="8" width="4"  height="4" fill="#222"/>
      <rect x="5"  y="9" width="2"  height="2" fill="#888"/>
      <rect x="17" y="9" width="2"  height="2" fill="#888"/>
    </svg>`,
    // green car
    `<svg width="48" height="20" viewBox="0 0 24 10" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated">
      <rect x="2"  y="4" width="20" height="5" fill="#1e8449"/>
      <rect x="5"  y="1" width="12" height="4" fill="#27ae60"/>
      <rect x="6"  y="2" width="4"  height="3" fill="#85c1e9" opacity="0.9"/>
      <rect x="12" y="2" width="4"  height="3" fill="#85c1e9" opacity="0.9"/>
      <rect x="0"  y="6" width="3"  height="3" fill="#f39c12"/>
      <rect x="21" y="6" width="3"  height="3" fill="#c0392b" opacity="0.6"/>
      <rect x="4"  y="8" width="4"  height="4" fill="#222"/>
      <rect x="16" y="8" width="4"  height="4" fill="#222"/>
      <rect x="5"  y="9" width="2"  height="2" fill="#888"/>
      <rect x="17" y="9" width="2"  height="2" fill="#888"/>
    </svg>`,
  ];

  const lane = document.getElementById('carLane');
  const gap  = document.getElementById('bridgeDeck').querySelector('.bridge-gap');
  const explosions = document.getElementById('explosions');

  function getGapCenter() {
    const rect = gap.getBoundingClientRect();
    return rect.left + rect.width / 2;
  }

  let carCount = 0;

  function spawnCar() {
    const willFall = Math.random() < 0.35; // 35% chance car falls
    const svg = carSVGs[Math.floor(Math.random() * carSVGs.length)];
    const speed = 3 + Math.random() * 3; // seconds to cross screen
    const car = document.createElement('div');
    car.className = 'car';
    car.innerHTML = svg;
    car.style.bottom = '0px';

    if (willFall) {
      const gapX = getGapCenter();
      const startX = -60;
      car.style.setProperty('--start-x', startX + 'px');
      car.style.setProperty('--gap-x', gapX + 'px');
      car.style.left = '0px';
      car.style.animation = `driveAndFall ${speed * 1.4}s linear forwards`;
      car.classList.add('falling');

      // Explosion when it falls
      car.addEventListener('animationend', () => {
        spawnExplosion(gapX, window.innerHeight - 140);
        car.remove();
      });
    } else {
      car.style.animation = `drive ${speed}s linear forwards`;
      car.addEventListener('animationend', () => car.remove());
    }

    lane.appendChild(car);
    carCount++;
  }

  function spawnExplosion(x, y) {
    const emojis = ['💥','🔥','💣','😱'];
    const e = document.createElement('div');
    e.className = 'explosion';
    e.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    e.style.left = (x - 20) + 'px';
    e.style.top  = (y - 20) + 'px';
    e.style.display = 'block';
    explosions.appendChild(e);
    setTimeout(() => e.remove(), 900);
  }

  // Spawn cars at random intervals
  function scheduleNextCar() {
    const delay = 800 + Math.random() * 2000;
    setTimeout(() => {
      spawnCar();
      scheduleNextCar();
    }, delay);
  }

  // Initial burst
  setTimeout(() => spawnCar(), 300);
  setTimeout(() => spawnCar(), 900);
  scheduleNextCar();
</script>
</body>
</html>
