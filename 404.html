<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Bridge Out</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: #0d0d1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
    }

    /* SKY */
    .sky {
      position: fixed; inset: 0;
      background: linear-gradient(180deg, #0d0d1a 0%, #1a1a3e 45%, #2d1b4e 72%, #1a3a5c 88%, #0a2030 100%);
      z-index: 0;
    }

    /* STARS */
    .stars { position:fixed; inset:0; z-index:1; }
    .star {
      position:absolute; background:#fff; border-radius:50%;
      animation: twinkle 2s infinite alternate;
    }
    @keyframes twinkle {
      from { opacity:0.15; } to { opacity:1; }
    }

    /* MOON */
    .moon { position:fixed; top:7%; right:11%; width:52px; height:52px; z-index:2; image-rendering:pixelated; }

    /* CITY — bottoms sit at water horizon, tops stay high */
    .city {
      position:fixed;
      bottom: 27%;
      left:0; width:100%; height:220px;
      z-index:3;
    }
    /* Window SVG overlay (same position as city) */
    .city-windows {
      position:fixed;
      bottom: 27%;
      left:0; width:100%; height:220px;
      z-index:4;
      pointer-events:none;
    }

    /* BRIDGE — sits at ~30% from bottom */
    .bridge-wrap {
      position:fixed;
      bottom: 28%;
      left:0; width:100%; height:22px;
      z-index:6;
      display:flex;
      align-items:flex-end;
    }

    /* Left intact half */
    .bridge-left {
      width: 58%;
      height: 20px;
      background: #3a3a3a;
      border-top: 3px solid #555;
      border-right: none;
      flex-shrink:0;
      position:relative;
    }
    /* Jagged broken edge */
    .bridge-left::after {
      content:'';
      position:absolute;
      right:-14px; top:-3px;
      width:14px; height:23px;
      background: linear-gradient(to bottom right, #3a3a3a 50%, transparent 50%);
      clip-path: polygon(0 0, 100% 0, 100% 30%, 70% 60%, 100% 80%, 60% 100%, 0 100%);
    }
    /* Road markings on bridge */
    .bridge-road-lines {
      position:absolute; top:6px; left:0; width:100%; height:5px;
      overflow:hidden;
    }
    .brl { position:absolute; width:50px; height:4px; background:#f5c518; animation: roadScroll 0.55s linear infinite; }
    @keyframes roadScroll { from{transform:translateX(0)} to{transform:translateX(-70px)} }

    /* CABLES */
    .cables {
      position:fixed;
      bottom: calc(28% + 20px);
      left:0; width:58%; height:130px;
      z-index:5;
      pointer-events:none;
    }

    /* CONSTRUCTION SIGN at broken edge */
    .sign {
      position:fixed;
      bottom: calc(28% + 20px);
      left: 56%;
      z-index:10;
      text-align:center;
      animation: signBob 1.1s ease-in-out infinite alternate;
    }
    .sign .board {
      background:#f5c518; border:3px solid #111;
      padding:5px 8px; font-size:6px; color:#111; line-height:1.8;
    }
    .sign .post { width:5px; height:28px; background:#aaa; margin:0 auto; }
    @keyframes signBob {
      from { transform:rotate(-3deg); } to { transform:rotate(3deg); }
    }

    /* WORKERS */
    .worker {
      position:fixed;
      bottom: calc(28% + 20px);
      z-index:11; image-rendering:pixelated;
    }
    .worker-a { left:48%; }
    .worker-b { left:52%; animation-delay:0.25s; }

    /* WATER at bottom */
    .water {
      position:fixed;
      bottom:0; left:0; width:100%; height:27%;
      z-index:4;
      background: linear-gradient(180deg, #0a2a45 0%, #0d3d66 40%, #0a2a45 100%);
      overflow:hidden;
    }
    .wave {
      position:absolute; top:0; left:-200px;
      width:calc(100% + 400px); height:40px;
      background: rgba(30,100,160,0.5);
      border-radius:50%;
      animation: wave linear infinite;
    }
    .wave1 { animation-duration:4s; top:4px; }
    .wave2 { animation-duration:6s; top:14px; opacity:0.6; animation-direction:reverse; }
    .wave3 { animation-duration:8s; top:24px; opacity:0.4; }
    @keyframes wave {
      from { transform:translateX(0) scaleY(1); }
      50%  { transform:translateX(80px) scaleY(1.3); }
      to   { transform:translateX(0) scaleY(1); }
    }

    /* CAR LAYER */
    .car-layer {
      position:fixed; bottom:0; left:0; width:100%; height:100%;
      z-index:8; pointer-events:none; overflow:hidden;
    }
    .car {
      position:absolute;
      image-rendering:pixelated;
    }

    /* SPLASH */
    .splash {
      position:absolute;
      font-size:22px;
      z-index:12;
      pointer-events:none;
      animation: splashAnim 0.9s ease-out forwards;
    }
    @keyframes splashAnim {
      0%   { transform:scale(0.4); opacity:1; }
      50%  { transform:scale(1.5); opacity:1; }
      100% { transform:scale(2); opacity:0; }
    }

    /* UI TEXT */
    .ui {
      position:relative; z-index:20;
      text-align:center;
      margin-bottom: 34%;
      padding:0 16px;
    }
    .error-code {
      font-size: clamp(48px, 9vw, 76px);
      color:#f5c518;
      text-shadow: 4px 4px 0 #a8860f, -2px -2px 0 #000;
      animation: glitch 3.5s infinite;
      letter-spacing:4px;
    }
    @keyframes glitch {
      0%,88%,100% { text-shadow:4px 4px 0 #a8860f,-2px -2px 0 #000; transform:none; }
      90% { transform:translateX(-3px); text-shadow:4px 4px 0 #f00,-2px -2px 0 #0ff; }
      92% { transform:translateX(3px);  text-shadow:4px 4px 0 #0ff,-2px -2px 0 #f00; }
      94% { transform:none; }
    }
    .subtitle { font-size:clamp(6px,1.4vw,9px); color:#bbb; margin-top:16px; line-height:2.2; }
    .home-btn {
      display:inline-block; margin-top:24px; padding:11px 22px;
      background:#f5c518; color:#111;
      font-family:'Press Start 2P',monospace; font-size:7px;
      text-decoration:none; border:3px solid #111; box-shadow:4px 4px 0 #000;
      transition:transform 0.1s,box-shadow 0.1s;
    }
    .home-btn:hover { transform:translate(2px,2px); box-shadow:2px 2px 0 #000; }
  </style>
</head>
<body>

<!-- Bridge deck (left half only, broken edge right side) -->
<div class="bridge-wrap">

    <div class="bridge-road-lines" id="roadLines"></div>
  </div>
</div>

<!-- Construction sign at broken edge -->

  <div class="board">⚠ BRIDGE OUT ⚠<br>404 NOT FOUND</div>

</div>

<!-- Workers -->

  <rect x="2" y="0" width="4" height="3" fill="#f5c518"/>

<!-- Water -->

  <div class="wave wave1"></div>

<!-- Cars rendered here by JS -->

<!-- UI -->
<div class="ui">
  <div class="error-code">404</div>
  <div class="subtitle">PAGE NOT FOUND<br><br>THIS ROAD ENDS HERE</div>
  <a class="home-btn" href="/">← GO HOME</a>
</div>

<script>
  // ── Stars ──
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 130; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() < 0.18 ? 2 : 1;
    s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*60}%;left:${Math.random()*100}%;animation-delay:${Math.random()*2}s;animation-duration:${1.5+Math.random()*2}s`;
    starsEl.appendChild(s);
  }

  // ── Windows ──
  // Buildings defined as {x, top, w} — bottom is always 220 (water level)
  const BUILDINGS = [
    {x:5,  top:45, w:30}, {x:10,  top:20, w:20},
    {x:68, top:32, w:28}, {x:135, top:42, w:18},
    {x:212,top:28, w:28}, {x:298, top:36, w:22},
    {x:382,top:22, w:24}, {x:526, top:28, w:20},
    {x:664,top:24, w:24}, {x:816, top:18, w:20},
    {x:962,top:22, w:22}, {x:1106,top:15, w:20},
    // wider buildings
    {x:55, top:55, w:50}, {x:195, top:52, w:62},
    {x:285,top:62, w:48}, {x:365, top:48, w:58},
    {x:450,top:58, w:42}, {x:510, top:52, w:52},
    {x:590,top:68, w:38}, {x:648, top:48, w:56},
    {x:730,top:58, w:44}, {x:800, top:42, w:52},
    {x:880,top:62, w:42}, {x:945, top:48, w:56},
    {x:1028,top:58,w:42}, {x:1090,top:42, w:52},
    {x:1160,top:52,w:40},
  ];

  const BOTTOM    = 218;
  const WIN_W     = 4, WIN_H = 4;
  const COL_GAP   = 3, ROW_GAP = 5;
  const MARGIN    = 3;
  const svgNS     = 'http://www.w3.org/2000/svg';
  const winSvg    = document.getElementById('windowsSvg');

  // Window colours: warm yellow, white, blue-white, orange
  const WIN_COLORS = ['#f5c518','#fffde7','#c8e6ff','#ffb347'];

  // Build all windows
  const allWindows   = [];   // {el, building index, floor}
  const byBuilding   = [];   // array of arrays

  BUILDINGS.forEach((b, bi) => {
    byBuilding[bi] = [];
    const cols   = Math.max(1, Math.floor((b.w - MARGIN*2) / (WIN_W + COL_GAP)));
    const height = BOTTOM - b.top;
    const rows   = Math.max(1, Math.floor((height - MARGIN*2) / (WIN_H + ROW_GAP)));
    const colStart = b.x + MARGIN + Math.floor(((b.w - MARGIN*2) - cols*(WIN_W+COL_GAP) + COL_GAP) / 2);

    for (let row = 0; row < rows; row++) {
      const wy = b.top + MARGIN + row * (WIN_H + ROW_GAP);
      for (let col = 0; col < cols; col++) {
        const wx = colStart + col * (WIN_W + COL_GAP);
        const el = document.createElementNS(svgNS, 'rect');
        el.setAttribute('x', wx);
        el.setAttribute('y', wy);
        el.setAttribute('width',  WIN_W);
        el.setAttribute('height', WIN_H);
        el.setAttribute('fill', WIN_COLORS[Math.floor(Math.random() * WIN_COLORS.length)]);
        el.setAttribute('opacity', Math.random() < 0.55 ? (0.5 + Math.random()*0.5).toFixed(2) : '0');
        winSvg.appendChild(el);
        const w = {el, bi, floor: row, col};
        allWindows.push(w);
        byBuilding[bi].push(w);
      }
    }
  });

  // ── Random "left on" blinkers — occasional slow flicker ──
  allWindows.forEach(w => {
    if (Math.random() < 0.12) {
      // randomly blinks now and then (forgotten light, maybe a fish tank)
      const blinkInterval = 4000 + Math.random() * 12000;
      setInterval(() => {
        const cur = parseFloat(w.el.getAttribute('opacity'));
        if (cur > 0) {
          // brief flicker off then back on
          w.el.setAttribute('opacity', '0');
          setTimeout(() => w.el.setAttribute('opacity', (0.6+Math.random()*0.4).toFixed(2)), 120 + Math.random()*200);
        }
      }, blinkInterval);
    }
  });

  // ── Janitor sweeper — per building, sweeps floors off one by one then restarts ──
  function runJanitor(bi) {
    const wins = byBuilding[bi];
    if (!wins.length) return;
    const floors = [...new Set(wins.map(w => w.floor))].sort((a,b) => b-a); // top to bottom

    // 3% of windows in this building are "always on" — stubborn lights, never swept
    const alwaysOn = new Set(wins.filter(() => Math.random() < 0.03).map(w => w.el));

    let fi = 0;
    function sweepNextFloor() {
      if (fi >= floors.length) {
        // Done — long pause, then lights come back on and janitor restarts
        setTimeout(() => {
          wins.forEach(w => {
            if (Math.random() < 0.5) w.el.setAttribute('opacity', (0.5+Math.random()*0.5).toFixed(2));
          });
          fi = 0;
          setTimeout(sweepNextFloor, 8000 + Math.random() * 12000);
        }, 5000 + Math.random() * 8000);
        return;
      }
      const floor = floors[fi++];
      wins.filter(w => w.floor === floor).forEach(w => {
        if (!alwaysOn.has(w.el)) w.el.setAttribute('opacity', '0');
      });
      // Much slower sweep — 1.2s to 3.5s per floor
      setTimeout(sweepNextFloor, 1200 + Math.random() * 2300);
    }

    // Stagger janitor start per building — spread over 60s so they're never in sync
    setTimeout(sweepNextFloor, 5000 + Math.random() * 55000);
  }

  // Assign ~40% of buildings a janitor
  BUILDINGS.forEach((_, bi) => {
    if (Math.random() < 0.4) runJanitor(bi);
  });

  // ── Road dashes on bridge ──
  const rl = document.getElementById('roadLines');
  for (let i = 0; i < 20; i++) {
    const d = document.createElement('div');
    d.className = 'brl';
    d.style.left = (i * 70) + 'px';
    d.style.top = '5px';
    d.style.animationDelay = (-i * 0.08) + 's';
    rl.appendChild(d);
  }

  // ── Car SVGs ──
  const carSVGs = [
    // red
    `<svg width="44" height="18" viewBox="0 0 22 9" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated">
      <rect x="1" y="4" width="20" height="4" fill="#c0392b"/>
      <rect x="4" y="1" width="12" height="4" fill="#e74c3c"/>
      <rect x="5" y="2" width="4" height="3" fill="#85c1e9" opacity="0.85"/>
      <rect x="11" y="2" width="4" height="3" fill="#85c1e9" opacity="0.85"/>
      <rect x="0" y="5" width="3" height="3" fill="#f9ca24"/>
      <rect x="19" y="5" width="3" height="3" fill="#c0392b" opacity="0.5"/>
      <rect x="3" y="7" width="4" height="4" fill="#111"/>
      <rect x="15" y="7" width="4" height="4" fill="#111"/>
      <rect x="4" y="8" width="2" height="2" fill="#777"/>
      <rect x="16" y="8" width="2" height="2" fill="#777"/>
    </svg>`,
    // blue
    `<svg width="44" height="18" viewBox="0 0 22 9" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated">
      <rect x="1" y="4" width="20" height="4" fill="#1a5276"/>
      <rect x="4" y="1" width="12" height="4" fill="#2e86c1"/>
      <rect x="5" y="2" width="4" height="3" fill="#85c1e9" opacity="0.85"/>
      <rect x="11" y="2" width="4" height="3" fill="#85c1e9" opacity="0.85"/>
      <rect x="0" y="5" width="3" height="3" fill="#f9ca24"/>
      <rect x="19" y="5" width="3" height="3" fill="#c0392b" opacity="0.5"/>
      <rect x="3" y="7" width="4" height="4" fill="#111"/>
      <rect x="15" y="7" width="4" height="4" fill="#111"/>
      <rect x="4" y="8" width="2" height="2" fill="#777"/>
      <rect x="16" y="8" width="2" height="2" fill="#777"/>
    </svg>`,
    // yellow taxi
    `<svg width="44" height="18" viewBox="0 0 22 9" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated">
      <rect x="1" y="4" width="20" height="4" fill="#d4ac0d"/>
      <rect x="4" y="1" width="12" height="4" fill="#f5c518"/>
      <rect x="5" y="2" width="4" height="3" fill="#85c1e9" opacity="0.85"/>
      <rect x="11" y="2" width="4" height="3" fill="#85c1e9" opacity="0.85"/>
      <rect x="8" y="0" width="5" height="2" fill="#111"/>
      <rect x="0" y="5" width="3" height="3" fill="#f9ca24"/>
      <rect x="19" y="5" width="3" height="3" fill="#c0392b" opacity="0.5"/>
      <rect x="3" y="7" width="4" height="4" fill="#111"/>
      <rect x="15" y="7" width="4" height="4" fill="#111"/>
      <rect x="4" y="8" width="2" height="2" fill="#777"/>
      <rect x="16" y="8" width="2" height="2" fill="#777"/>
    </svg>`,
    // green
    `<svg width="44" height="18" viewBox="0 0 22 9" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated">
      <rect x="1" y="4" width="20" height="4" fill="#1e8449"/>
      <rect x="4" y="1" width="12" height="4" fill="#27ae60"/>
      <rect x="5" y="2" width="4" height="3" fill="#85c1e9" opacity="0.85"/>
      <rect x="11" y="2" width="4" height="3" fill="#85c1e9" opacity="0.85"/>
      <rect x="0" y="5" width="3" height="3" fill="#f9ca24"/>
      <rect x="19" y="5" width="3" height="3" fill="#c0392b" opacity="0.5"/>
      <rect x="3" y="7" width="4" height="4" fill="#111"/>
      <rect x="15" y="7" width="4" height="4" fill="#111"/>
      <rect x="4" y="8" width="2" height="2" fill="#777"/>
      <rect x="16" y="8" width="2" height="2" fill="#777"/>
    </svg>`,
  ];

  const layer = document.getElementById('carLayer');

  // Get bridge edge X position in viewport
  function getBridgeEdgeX() {
    const bridge = document.getElementById('bridgeLeft');
    const rect = bridge.getBoundingClientRect();
    return rect.right;
  }

  // Get bridge Y position
  function getBridgeY() {
    const bridge = document.getElementById('bridgeLeft');
    const rect = bridge.getBoundingClientRect();
    return rect.top;
  }

  // Get water surface Y
  function getWaterY() {
    return window.innerHeight * 0.73;
  }

  function spawnCar() {
    const svgStr = carSVGs[Math.floor(Math.random() * carSVGs.length)];
    const speed  = 2.8 + Math.random() * 2.2; // seconds to cross full screen
    const carH   = 18;

    const edgeX   = getBridgeEdgeX();
    const bridgeY = getBridgeY();

    const car = document.createElement('div');
    car.className = 'car';
    car.innerHTML = svgStr;
    car.style.left = '-60px';
    car.style.top  = (bridgeY - carH + 4) + 'px';
    layer.appendChild(car);

    const vw           = window.innerWidth;
    const totalDrivePx = edgeX + 60;           // px from start to edge
    const driveTimeMs  = speed * 1000 * (totalDrivePx / vw); // proportional time
    const vx           = totalDrivePx / driveTimeMs; // px/ms — constant horizontal velocity

    const startTime = performance.now();

    function driveTick(now) {
      const elapsed = now - startTime;
      if (elapsed >= driveTimeMs) {
        // Hand off to fall with exact same vx
        startFall(car, edgeX, bridgeY - carH + 4, vx);
        return;
      }
      car.style.left = (-60 + vx * elapsed) + 'px';
      requestAnimationFrame(driveTick);
    }
    requestAnimationFrame(driveTick);
  }

  function startFall(car, startX, startY, vx) {
    // Real projectile physics: constant vx, vy starts at 0 and accelerates
    const gravity   = 0.00055; // px/ms^2  — tune for feel
    const waterY    = getWaterY();
    const startTime = performance.now();
    let   vy        = 0;
    let   prevTime  = startTime;
    let   x         = startX;
    let   y         = startY;

    function fallTick(now) {
      const dt = now - prevTime;
      prevTime = now;

      vy += gravity * dt;   // gravity accelerates downward
      x  += vx * dt;        // constant forward momentum
      y  += vy * dt;

      // Nose-down rotation based on vertical vs horizontal velocity ratio
      const angle = Math.atan2(vy, vx) * (180 / Math.PI);
      car.style.left      = x + 'px';
      car.style.top       = y + 'px';
      car.style.transform = `rotate(${angle}deg)`;

      if (y >= waterY) {
        spawnSplash(x, waterY);
        car.remove();
        return;
      }
      requestAnimationFrame(fallTick);
    }
    requestAnimationFrame(fallTick);
  }

  function spawnSplash(x, y) {
    const emojis = ['💦','🌊','💧','😱','💥'];
    const e = document.createElement('div');
    e.className = 'splash';
    e.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    e.style.left = (x - 14) + 'px';
    e.style.top  = (y - 14) + 'px';
    layer.appendChild(e);
    setTimeout(() => e.remove(), 950);
  }

  // Continuous car spawning
  function scheduleNext() {
    const delay = 900 + Math.random() * 1800;
    setTimeout(() => { spawnCar(); scheduleNext(); }, delay);
  }

  // Initial cars
  setTimeout(() => spawnCar(), 400);
  setTimeout(() => spawnCar(), 1200);
  scheduleNext();

  // ═══════════════════════════════════════════
  // LIVING WORLD — planes, helicopter, boats, shooting stars
  // ═══════════════════════════════════════════

  const sky    = document.querySelector('.sky');
  const body   = document.body;
  const vw     = () => window.innerWidth;
  const vh     = () => window.innerHeight;
  const skyH   = () => vh() * 0.73;   // sky ends at water
  const waterY = () => vh() * 0.73;

  function el(tag, css, html='') {
    const e = document.createElement(tag);
    Object.assign(e.style, css);
    e.innerHTML = html;
    e.style.position = 'fixed';
    e.style.imageRendering = 'pixelated';
    e.style.pointerEvents = 'none';
    document.body.appendChild(e);
    return e;
  }

  // ── SHOOTING STAR ──
  function spawnShootingStar() {
    const startX = 10 + Math.random() * 60;  // % from left
    const startY = 3  + Math.random() * 25;  // % from top
    const len    = 120 + Math.random() * 160;
    const angle  = 20 + Math.random() * 30;  // degrees downward

    const star = el('div', {
      left: startX + '%', top: startY + '%',
      width: len + 'px', height: '2px',
      background: 'linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,220,0.9) 100%)',
      transform: `rotate(${angle}deg)`,
      transformOrigin: 'left center',
      opacity: '0',
      zIndex: '2',
      transition: 'opacity 0.1s',
    });

    // Flash on, streak, fade out
    requestAnimationFrame(() => {
      star.style.opacity = '1';
      star.style.transition = 'opacity 0.6s, transform 0.6s';
      star.style.transform = `rotate(${angle}deg) translateX(${len*0.6}px)`;
      setTimeout(() => {
        star.style.opacity = '0';
        setTimeout(() => star.remove(), 700);
      }, 200);
    });

    // Schedule next — rare, every 25-90s
    setTimeout(spawnShootingStar, 25000 + Math.random() * 65000);
  }
  setTimeout(spawnShootingStar, 8000 + Math.random() * 20000);

  // ── PLANES ──
  const planeSVGs = [
    // commercial jet (facing right)
    `<svg width="52" height="18" viewBox="0 0 26 9" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="3" width="20" height="3" fill="#ccc"/>
      <rect x="18" y="2" width="6" height="2" fill="#bbb"/>
      <polygon points="0,4 4,2 4,6" fill="#ddd"/>
      <rect x="7" y="0" width="10" height="3" fill="#bbb"/>
      <rect x="7" y="6" width="6"  height="2" fill="#bbb"/>
      <rect x="1"  y="4" width="2" height="1" fill="#85c1e9" opacity="0.7"/>
    </svg>`,
    // small prop plane
    `<svg width="40" height="14" viewBox="0 0 20 7" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2" width="14" height="2" fill="#e0e0e0"/>
      <polygon points="0,3 3,1 3,4" fill="#eee"/>
      <rect x="16" y="1" width="4" height="1" fill="#ccc"/>
      <rect x="6"  y="0" width="7" height="2" fill="#ddd"/>
      <rect x="6"  y="4" width="4" height="1" fill="#ddd"/>
    </svg>`,
  ];

  function spawnPlane() {
    const goRight  = Math.random() < 0.6;
    const altitude = 4 + Math.random() * 32; // % from top (sky only)
    const speed    = 8 + Math.random() * 14; // seconds across
    const svg      = planeSVGs[Math.floor(Math.random() * planeSVGs.length)];
    const w        = goRight ? 52 : 40;

    const plane = el('div', {
      top: altitude + '%',
      left: goRight ? '-60px' : (vw() + 10) + 'px',
      zIndex: '15',
      transform: goRight ? 'none' : 'scaleX(-1)',
    }, svg);

    // Blinking nav light
    const blink = document.createElement('div');
    Object.assign(blink.style, {
      position:'absolute', width:'3px', height:'3px',
      background: goRight ? '#ff4444' : '#44ff44',
      borderRadius:'50%',
      top:'2px', [goRight ? 'right' : 'left']: '2px',
      animation: `planeBlink ${0.8 + Math.random()*0.6}s step-end infinite`,
    });
    plane.firstChild && plane.firstChild.appendChild ? null : null;
    plane.appendChild(blink);

    const startTime = performance.now();
    const totalPx   = vw() + 80;
    const dir       = goRight ? 1 : -1;

    function tick(now) {
      const t = (now - startTime) / (speed * 1000);
      const x = goRight ? (-60 + totalPx * t) : (vw() + 10 - totalPx * t);
      plane.style.left = x + 'px';
      if (t < 1) requestAnimationFrame(tick);
      else plane.remove();
    }
    requestAnimationFrame(tick);

    setTimeout(spawnPlane, 12000 + Math.random() * 30000);
  }
  // Add blink keyframe
  const blinkStyle = document.createElement('style');
  blinkStyle.textContent = `@keyframes planeBlink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    @keyframes rotorSpin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes heliHover { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    @keyframes boatBob   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-2px)} }`;
  document.head.appendChild(blinkStyle);

  setTimeout(spawnPlane, 5000 + Math.random() * 10000);
  setTimeout(spawnPlane, 20000 + Math.random() * 15000); // second plane lane

  // ── HELICOPTER ──
  // SVG faces RIGHT — cockpit/nose at the right side (high x), tail at left.
  // So: moving right = 'none', moving left = 'scaleX(-1)' (already correct in moveHeli).
  const heliSVG = `<svg width="52" height="22" viewBox="0 0 52 22" xmlns="http://www.w3.org/2000/svg">
    <!-- tail rotor (far left, spinning blades) -->
    <rect x="0" y="3"  width="2"  height="15" fill="#999" opacity="0.6"/>
    <!-- tail vertical fin -->
    <rect x="2" y="4"  width="4"  height="10" fill="#5a5a6a"/>
    <!-- tail boom (thin tube to body) -->
    <rect x="4" y="9"  width="20" height="4"  fill="#6a6a7a"/>
    <!-- main cabin body -->
    <rect x="22" y="4" width="20" height="14" fill="#7a7a8a"/>
    <!-- cabin top highlight -->
    <rect x="22" y="4" width="20" height="3"  fill="#9a9aaa"/>
    <!-- cabin windows -->
    <rect x="25" y="6" width="5"  height="6"  fill="#5da8d4" opacity="0.6"/>
    <rect x="32" y="6" width="4"  height="6"  fill="#5da8d4" opacity="0.4"/>
    <!-- cockpit bubble (right side) -->
    <rect x="40" y="5" width="9"  height="11" fill="#5da8d4" opacity="0.85"/>
    <!-- nose tip -->
    <rect x="48" y="8" width="4"  height="5"  fill="#6a6a7a"/>
    <!-- skid struts -->
    <rect x="27" y="17" width="2" height="4"  fill="#555"/>
    <rect x="36" y="17" width="2" height="4"  fill="#555"/>
    <!-- landing skids -->
    <rect x="24" y="20" width="16" height="2" fill="#555"/>
  </svg>`;

  let heliEl = null;
  let heliX  = vw() * 0.3;
  let heliY  = vh() * 0.18;

  function createHeli() {
    heliEl = el('div', {
      left: heliX + 'px', top: heliY + 'px',
      zIndex: '18',
      animation: 'heliHover 2s ease-in-out infinite',
    }, heliSVG);

    // Main rotor — centered over cabin (cabin x=22-42 → center=32px)
    const rotor = document.createElement('div');
    Object.assign(rotor.style, {
      position:'absolute', top:'0px', left:'18px',
      width:'28px', height:'3px',
      background:'linear-gradient(90deg,transparent 0%,#aaa 20%,#aaa 80%,transparent 100%)',
      transformOrigin:'center center',
      animation:'rotorSpin 0.12s linear infinite',
    });
    heliEl.appendChild(rotor);

    // Red blink light on underside
    const hBlink = document.createElement('div');
    Object.assign(hBlink.style, {
      position:'absolute', width:'3px', height:'3px',
      background:'#ff2222', borderRadius:'50%',
      bottom:'2px', left:'30px',
      animation:'planeBlink 0.9s step-end infinite',
    });
    heliEl.appendChild(hBlink);
  }

  function moveHeli() {
    if (!heliEl) createHeli();
    const targetX = vw() * (0.1 + Math.random() * 0.75);
    const targetY = vh() * (0.08 + Math.random() * 0.45);
    const dist    = Math.hypot(targetX - heliX, targetY - heliY);
    const speed   = 40 + Math.random() * 30; // px per second
    const dur     = (dist / speed) * 1000;
    const startX  = heliX, startY = heliY;
    const startT  = performance.now();

    // SVG faces right: moving right=none, moving left=flip
    heliEl.style.transform = targetX > heliX ? 'none' : 'scaleX(-1)';

    function fly(now) {
      const t = Math.min((now - startT) / dur, 1);
      heliX = startX + (targetX - startX) * t;
      heliY = startY + (targetY - startY) * t;
      heliEl.style.left = heliX + 'px';
      heliEl.style.top  = heliY + 'px';
      if (t < 1) requestAnimationFrame(fly);
      else setTimeout(moveHeli, 3000 + Math.random() * 8000); // hover then move again
    }
    requestAnimationFrame(fly);
  }
  setTimeout(moveHeli, 3000);

  // ── BOATS ──
  // Three boat types: small fishing boat, medium tugboat, large tug/barge
  const boatDefs = [
    // Small fishing boat — low profile, single light
    { w: 38, h: 16, wakeOff: 32, svg:
      `<svg width="38" height="16" viewBox="0 0 38 16" xmlns="http://www.w3.org/2000/svg">
        <polygon points="2,10 4,7 34,7 38,10 36,13 2,13" fill="#2a3a4a"/>
        <rect x="8"  y="4"  width="10" height="3" fill="#1e2e3a"/>
        <rect x="10" y="2"  width="1"  height="2" fill="#aaa"/>
        <rect x="9"  y="5"  width="2"  height="2" fill="#85c1e9" opacity="0.7"/>
        <rect x="9"  y="12" width="4"  height="2" fill="#f5c518" opacity="0.5"/>
      </svg>` },
    // Medium tugboat — chunky cab, smoke stack
    { w: 58, h: 24, wakeOff: 52, svg:
      `<svg width="58" height="24" viewBox="0 0 58 24" xmlns="http://www.w3.org/2000/svg">
        <polygon points="0,22 4,14 54,14 58,18 56,22" fill="#6B3410"/>
        <rect x="4"  y="7"  width="24" height="7"  fill="#8B4513"/>
        <rect x="6"  y="3"  width="4"  height="4"  fill="#aaa"/>
        <rect x="10" y="4"  width="1"  height="5"  fill="#888"/>
        <rect x="28" y="10" width="6"  height="4"  fill="#7a3810"/>
        <rect x="5"  y="8"  width="3"  height="3"  fill="#85c1e9" opacity="0.7"/>
        <rect x="10" y="8"  width="3"  height="3"  fill="#85c1e9" opacity="0.6"/>
        <rect x="3"  y="17" width="6"  height="3"  fill="#f5c518" opacity="0.4"/>
      </svg>` },
    // Large tug / container barge — wide, flat deck, big cab, two stacks
    { w: 90, h: 30, wakeOff: 82, svg:
      `<svg width="90" height="30" viewBox="0 0 90 30" xmlns="http://www.w3.org/2000/svg">
        <polygon points="0,28 6,18 84,18 90,22 88,28" fill="#3a2a18"/>
        <rect x="6"  y="8"  width="30" height="10" fill="#5a3a20"/>
        <rect x="8"  y="4"  width="5"  height="4"  fill="#999"/>
        <rect x="14" y="5"  width="1"  height="5"  fill="#777"/>
        <rect x="20" y="5"  width="5"  height="4"  fill="#999"/>
        <rect x="26" y="6"  width="1"  height="4"  fill="#777"/>
        <rect x="40" y="12" width="30" height="6"   fill="#4a3218"/>
        <rect x="44" y="9"  width="8"  height="3"   fill="#3a2810"/>
        <rect x="6"  y="9"  width="3"  height="4"  fill="#85c1e9" opacity="0.7"/>
        <rect x="14" y="9"  width="3"  height="4"  fill="#85c1e9" opacity="0.6"/>
        <rect x="22" y="9"  width="3"  height="4"  fill="#85c1e9" opacity="0.5"/>
        <rect x="5"  y="22" width="8"  height="4"  fill="#f5c518" opacity="0.35"/>
        <rect x="20" y="22" width="5"  height="3"  fill="#f5c518" opacity="0.25"/>
      </svg>` },
  ];

  function spawnBoat() {
    const goRight = Math.random() < 0.5;
    const def     = boatDefs[Math.floor(Math.random() * boatDefs.length)];
    // Larger boats ride lower and slower
    const sizeScale = def.w / 58;
    const speed   = (22 + Math.random() * 28) / sizeScale; // bigger = slower
    const yOffset = vh() * (0.74 + Math.random() * 0.1);

    const boat = el('div', {
      top: yOffset + 'px',
      left: goRight ? (-def.w - 10) + 'px' : (vw() + 10) + 'px',
      zIndex: '7',
      transform: goRight ? 'none' : 'scaleX(-1)',
      animation: `boatBob ${2 + sizeScale}s ease-in-out infinite`,
    }, def.svg);

    // Wake trail behind boat
    const wake = document.createElement('div');
    Object.assign(wake.style, {
      position:'absolute', top: Math.round(def.h * 0.7) + 'px',
      [goRight ? 'right' : 'left']: def.wakeOff + 'px',
      width: Math.round(def.w * 0.6) + 'px', height:'4px',
      background:'linear-gradient(' + (goRight?'90deg':'270deg') + ',rgba(255,255,255,0.25),transparent)',
      borderRadius:'50%',
    });
    boat.appendChild(wake);

    const startTime = performance.now();
    const totalPx   = vw() + def.w + 20;

    function tick(now) {
      const t = (now - startTime) / (speed * 1000);
      const x = goRight ? (-(def.w + 10) + totalPx * t) : (vw() + 10 - totalPx * t);
      boat.style.left = x + 'px';
      if (t < 1) requestAnimationFrame(tick);
      else boat.remove();
    }
    requestAnimationFrame(tick);

    setTimeout(spawnBoat, 18000 + Math.random() * 40000);
  }

    setTimeout(spawnBoat, 18000 + Math.random() * 40000);
  }
  setTimeout(spawnBoat, 4000  + Math.random() * 8000);
  setTimeout(spawnBoat, 15000 + Math.random() * 12000);
</script>
</body>
</html>
