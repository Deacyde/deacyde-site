<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Linux Commands Reference | Deacyde</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d0d0d; color: #fff; min-height: 100vh; }

    /* Header */
    .page-header { padding: 2rem 1.5rem 1rem; max-width: 1400px; margin: 0 auto; }
    .back { color: #888; text-decoration: none; font-size: 0.9rem; display: inline-block; margin-bottom: 1.25rem; }
    .back:hover { color: #fff; }
    .page-header h1 { font-size: 1.9rem; margin-bottom: 0.35rem; }
    .page-header p { color: #888; font-size: 0.95rem; }

    /* Search */
    .search-wrap { max-width: 1400px; margin: 0 auto; padding: 1rem 1.5rem; position: relative; }
    .search-input { width: 100%; padding: 0.75rem 1rem 0.75rem 2.75rem; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; color: #fff; font-size: 0.95rem; outline: none; }
    .search-input:focus { border-color: #3b82f6; }
    .search-icon { position: absolute; left: 2.5rem; top: 50%; transform: translateY(-50%); color: #555; font-size: 1rem; pointer-events: none; }
    .autocomplete-list { position: absolute; top: calc(100% - 0.5rem); left: 1.5rem; right: 1.5rem; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; z-index: 100; max-height: 280px; overflow-y: auto; display: none; }
    .autocomplete-item { padding: 0.6rem 1rem; cursor: pointer; font-size: 0.88rem; display: flex; align-items: center; gap: 0.75rem; }
    .autocomplete-item:hover, .autocomplete-item.active { background: #252525; }
    .autocomplete-cmd { font-family: monospace; color: #60a5fa; font-weight: 600; }
    .autocomplete-desc { color: #666; font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .autocomplete-tag { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; background: #252525; color: #888; white-space: nowrap; }

    /* Distro selector grid */
    .distro-selector { max-width: 1400px; margin: 0 auto; padding: 1rem 1.5rem 0; }
    .distro-grid { display: grid; grid-template-columns: repeat(9, minmax(0, 140px)); justify-content: center; gap: 0.6rem; margin-bottom: 1rem; }
    .distro-tile { background: #111; border: 1px solid #222; border-radius: 10px; padding: 0.65rem 0.4rem; cursor: pointer; text-align: center; transition: border-color .15s, background .15s; display: flex; flex-direction: column; align-items: center; gap: 0.25rem; }
    .distro-tile:hover { background: #1a1a1a; border-color: #444; }
    .distro-tile.active { border-color: #3b82f6; background: #0f1f3d; }
    .distro-tile .tile-icon { font-size: 1.4rem; line-height: 1; }
    .distro-tile .tile-name { font-size: 0.7rem; color: #aaa; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; text-align: center; }
    .distro-tile.active .tile-name { color: #fff; }
    .universal-tile { grid-column: 1 / -1; flex-direction: row; justify-content: center; gap: 0.6rem; padding: 0.7rem 1rem; border-color: #1e3a5f !important; border-radius: 10px; }
    .universal-tile .tile-icon { font-size: 1.3rem; }
    .universal-tile .tile-name { font-size: 0.85rem; width: auto; font-weight: 600; letter-spacing: 0.03em; }
    .universal-tile.active { background: #0a1f35 !important; border-color: #3b82f6 !important; }
    .universal-tile.active .tile-name { color: #fff; }
    @media (max-width: 900px) { .distro-grid { grid-template-columns: repeat(6, minmax(0, 140px)); } }
    @media (max-width: 600px) { .distro-grid { grid-template-columns: repeat(4, minmax(0, 140px)); } }

    /* Main layout */
    .main { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }

    /* Distro bio card */
    .distro-bio { background: #111; border: 1px solid #222; border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; display: grid; grid-template-columns: auto 1fr auto; gap: 1.25rem; align-items: start; }
    .distro-logo { font-size: 3rem; line-height: 1; }
    .distro-info h2 { font-size: 1.3rem; margin-bottom: 0.3rem; }
    .distro-info .tagline { color: #888; font-size: 0.9rem; margin-bottom: 0.5rem; }
    .distro-info .history { color: #aaa; font-size: 0.85rem; line-height: 1.6; margin-bottom: 0.75rem; max-width: 700px; }
    .distro-meta { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.75rem; }
    .meta-badge { font-size: 0.75rem; padding: 3px 9px; border-radius: 5px; border: 1px solid #333; color: #aaa; }
    .meta-badge.good { border-color: #166534; color: #4ade80; background: #052e16; }
    .meta-badge.warn { border-color: #854d0e; color: #fbbf24; background: #1c1007; }
    .pros-cons { display: flex; gap: 1.5rem; flex-wrap: wrap; }
    .pros, .cons { flex: 1; min-width: 160px; }
    .pros h4, .cons h4 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem; }
    .pros h4 { color: #4ade80; }
    .cons h4 { color: #f87171; }
    .pros ul, .cons ul { list-style: none; }
    .pros li::before { content: '✓ '; color: #4ade80; font-size: 0.8rem; }
    .cons li::before { content: '✗ '; color: #f87171; font-size: 0.8rem; }
    .pros li, .cons li { font-size: 0.82rem; color: #aaa; margin-bottom: 0.2rem; }
    .distro-actions { display: flex; flex-direction: column; gap: 0.5rem; align-items: flex-end; }
    .dl-btn { padding: 0.5rem 1rem; background: #1a1a1a; border: 1px solid #333; border-radius: 7px; color: #aaa; text-decoration: none; font-size: 0.82rem; white-space: nowrap; }
    .dl-btn:hover { border-color: #3b82f6; color: #60a5fa; }
    .best-for { font-size: 0.75rem; color: #666; text-align: right; max-width: 150px; }

    /* Section headers */
    .section-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.07em; color: #555; margin-bottom: 1rem; margin-top: 0.5rem; }

    /* Category groups */
    .category { margin-bottom: 2rem; }
    .cat-header { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.75rem; cursor: pointer; user-select: none; }
    .cat-header h3 { font-size: 0.95rem; color: #ccc; }
    .cat-header .cat-icon { font-size: 1.1rem; }
    .cat-header .cat-count { font-size: 0.72rem; color: #555; }
    .cat-header .cat-toggle { margin-left: auto; color: #555; font-size: 0.8rem; transition: transform .2s; }
    .cat-header.collapsed .cat-toggle { transform: rotate(-90deg); }

    /* Command rows */
    .cmd-list { display: flex; flex-direction: column; gap: 0.4rem; }
    .cmd-row { background: #111; border: 1px solid #1e1e1e; border-radius: 8px; overflow: hidden; }
    .cmd-row.highlight { border-color: #1d4ed8; }
    .cmd-summary { display: flex; align-items: center; gap: 0.85rem; padding: 0.65rem 1rem; cursor: pointer; }
    .cmd-summary:hover { background: #161616; }
    .cmd-name { font-family: monospace; font-size: 0.92rem; color: #60a5fa; font-weight: 600; min-width: 160px; }
    .cmd-desc { color: #aaa; font-size: 0.85rem; flex: 1; }
    .cmd-tags { display: flex; gap: 0.35rem; flex-wrap: wrap; }
    .cmd-tag { font-size: 0.68rem; padding: 2px 6px; border-radius: 4px; background: #1a1a1a; color: #666; border: 1px solid #2a2a2a; }
    .cmd-expand-icon { color: #444; font-size: 0.8rem; transition: transform .2s; flex-shrink: 0; }
    .cmd-row.open .cmd-expand-icon { transform: rotate(180deg); }
    .cmd-detail { display: none; border-top: 1px solid #1e1e1e; padding: 1rem 1rem 1rem 1.25rem; }
    .cmd-row.open .cmd-detail { display: block; }
    .cmd-detail p { color: #999; font-size: 0.85rem; line-height: 1.6; margin-bottom: 0.75rem; }
    .cmd-detail h5 { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; color: #555; margin-bottom: 0.4rem; }
    .flag-list { display: flex; flex-direction: column; gap: 0.3rem; margin-bottom: 0.75rem; }
    .flag-row { display: flex; gap: 0.75rem; align-items: baseline; }
    .flag-name { font-family: monospace; font-size: 0.82rem; color: #a78bfa; min-width: 140px; }
    .flag-desc { font-size: 0.82rem; color: #888; }
    .example-block { background: #0a0a0a; border: 1px solid #1e1e1e; border-radius: 6px; padding: 0.6rem 0.85rem; font-family: monospace; font-size: 0.82rem; color: #86efac; overflow-x: auto; }

    /* Universal tab divider in distro tabs */
    .universal-divider { display: flex; align-items: center; gap: 1rem; margin: 2rem 0 1.5rem; }
    .universal-divider span { color: #555; font-size: 0.8rem; white-space: nowrap; }
    .universal-divider::before, .universal-divider::after { content: ''; flex: 1; height: 1px; background: #1e1e1e; }

    /* Tab panels */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* No results */
    .no-results { text-align: center; padding: 3rem; color: #555; }
    .no-results .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }

    /* Responsive */
    @media (max-width: 700px) {
      .distro-bio { grid-template-columns: 1fr; }
      .distro-actions { align-items: flex-start; flex-direction: row; flex-wrap: wrap; }
      .best-for { text-align: left; }
      .cmd-name { min-width: 110px; }
    }
  </style>
</head>

<script>

const UNIVERSAL = {
  categories: [
    {

// ═══════════════════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════════════════

function buildCommandHTML(cmd, id) {
  const flags = cmd.flags.map(f =>
    `<div class="flag-row"><span class="flag-name">${escHtml(f.f)}</span><span class="flag-desc">${escHtml(f.d)}</span></div>`
  ).join('');
  const flagsSection = flags ? `<h5>Common Flags</h5><div class="flag-list">${flags}</div>` : '';
  const exampleLines = cmd.example.split('\n').map(escHtml).join('\n');
  return `
    <div class="cmd-row" id="${id}" data-cmd="${escHtml(cmd.cmd)}" data-desc="${escHtml(cmd.desc)}" data-tags="${(cmd.tags||[]).join(' ')}">
      <div class="cmd-summary" onclick="toggleCmd(this.parentElement)">
        <span class="cmd-name">${escHtml(cmd.cmd)}</span>
        <span class="cmd-desc">${escHtml(cmd.desc)}</span>
        <div class="cmd-tags">${(cmd.tags||[]).map(t=>`<span class="cmd-tag">${t}</span>`).join('')}</div>
        <span class="cmd-expand-icon">▼</span>
      </div>
      <div class="cmd-detail">
        <p>${escHtml(cmd.detail)}</p>
        ${flagsSection}
        <h5>Example</h5>
        <pre class="example-block">${exampleLines}</pre>
      </div>
    </div>`;
}

function buildCategoryHTML(cat, prefix) {
  const cmds = cat.commands.map((c,i) => buildCommandHTML(c, `${prefix}-${cat.id}-${i}`)).join('');
  return `
    <div class="category" id="cat-${prefix}-${cat.id}">
      <div class="cat-header" onclick="toggleCat(this)">
        <span class="cat-icon">${cat.icon}</span>
        <h3>${escHtml(cat.name)}</h3>
        <span class="cat-count">${cat.commands.length} commands</span>
        <span class="cat-toggle">▼</span>
      </div>
      <div class="cmd-list">${cmds}</div>
    </div>`;
}

function buildUniversalPanel() {
  const cats = UNIVERSAL.categories.map(c => buildCategoryHTML(c, 'u')).join('');
  return `<div class="tab-panel active" id="panel-universal">
    <p class="section-label">Commands available across all Linux distros</p>
    ${cats}
  </div>`;
}

function buildDistroPanel(id, distro) {
  const bio = `
    <div class="distro-bio">
      <div class="distro-logo">${distro.icon}</div>
      <div class="distro-info">
        <h2>${escHtml(distro.name)}</h2>
        <p class="tagline">${escHtml(distro.tagline)}</p>
        <p class="history">${escHtml(distro.history)}</p>
        <div class="distro-meta">
          <span class="meta-badge">Founded: ${escHtml(distro.founded)}</span>
          <span class="meta-badge">Base: ${escHtml(distro.base)}</span>
          <span class="meta-badge good">Package Mgr: ${escHtml(distro.packageMgr)}</span>
        </div>
        <div class="pros-cons">
          <div class="pros"><h4>Pros</h4><ul>${distro.pros.map(p=>`<li>${escHtml(p)}</li>`).join('')}</ul></div>
          <div class="cons"><h4>Cons</h4><ul>${distro.cons.map(c=>`<li>${escHtml(c)}</li>`).join('')}</ul></div>
        </div>
      </div>
      <div class="distro-actions">
        <a class="dl-btn" href="${distro.downloadUrl}" target="_blank" rel="noopener">⬇️ Download ${escHtml(distro.name)}</a>
        <p class="best-for">Best for: ${escHtml(distro.bestFor)}</p>
      </div>
    </div>`;

  const cats = distro.categories.map(c => buildCategoryHTML(c, id)).join('');

  return `<div class="tab-panel" id="panel-${id}">
    ${bio}
    <p class="section-label">Distro-specific commands &amp; package management</p>
    ${cats}
    <div class="universal-divider"><span>📌 Universal commands also apply — see the Universal tab</span></div>
  </div>`;
}

function buildAllPanels() {
  const main = document.getElementById('mainContent');
  let html = buildUniversalPanel();
  for (const [id, distro] of Object.entries(DISTROS)) {
    html += buildDistroPanel(id, distro);
  }
  main.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════════════════════

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function switchTab(tabId, btn) {
  document.querySelectorAll('.distro-tile').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  const panel = document.getElementById('panel-' + tabId);
  if (panel) panel.classList.add('active');
  clearSearch();
}

function toggleCmd(row) {
  row.classList.toggle('open');
}

function toggleCat(header) {
  header.classList.toggle('collapsed');
  const list = header.nextElementSibling;
  list.style.display = header.classList.contains('collapsed') ? 'none' : '';
}

// ═══════════════════════════════════════════════════════════════
// SEARCH / AUTOCOMPLETE
// ═══════════════════════════════════════════════════════════════

let allCommands = [];
let acIndex = -1;

function buildSearchIndex() {
  // Universal
  for (const cat of UNIVERSAL.categories) {
    for (const cmd of cat.commands) {
      allCommands.push({ cmd: cmd.cmd, desc: cmd.desc, tags: cmd.tags, tab: 'universal', tabLabel: 'Universal', cat: cat.name });
    }
  }
  // Distros
  for (const [id, distro] of Object.entries(DISTROS)) {
    for (const cat of distro.categories) {
      for (const cmd of cat.commands) {
        allCommands.push({ cmd: cmd.cmd, desc: cmd.desc, tags: cmd.tags, tab: id, tabLabel: distro.name, cat: cat.name });
      }
    }
  }
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('autocompleteList').style.display = 'none';
  // Show all hidden rows
  document.querySelectorAll('.cmd-row').forEach(r => { r.style.display = ''; r.classList.remove('highlight'); });
  document.querySelectorAll('.category').forEach(c => c.style.display = '');
}

function doSearch(query) {
  const q = query.toLowerCase().trim();
  const list = document.getElementById('autocompleteList');
  if (!q) { list.style.display = 'none'; acIndex = -1; return; }

  const matches = allCommands.filter(c =>
    c.cmd.toLowerCase().includes(q) ||
    c.desc.toLowerCase().includes(q) ||
    (c.tags||[]).some(t => t.toLowerCase().includes(q))
  ).slice(0, 12);

  if (!matches.length) { list.style.display = 'none'; return; }

  list.innerHTML = matches.map((m, i) =>
    `<div class="autocomplete-item" data-tab="${m.tab}" data-cmd="${escHtml(m.cmd)}" onclick="selectResult('${m.tab}', '${escHtml(m.cmd)}')">
      <span class="autocomplete-cmd">${escHtml(m.cmd)}</span>
      <span class="autocomplete-desc">${escHtml(m.desc)}</span>
      <span class="autocomplete-tag">${escHtml(m.tabLabel)}</span>
    </div>`
  ).join('');
  list.style.display = 'block';
  acIndex = -1;
}

function selectResult(tabId, cmdName) {
  // Switch to correct tab
  const tabBtn = document.querySelector(`.distro-tile[data-tab="${tabId}"]`);
  if (tabBtn) switchTab(tabId, tabBtn);

  // Find and highlight the command row
  setTimeout(() => {
    const rows = document.querySelectorAll('.cmd-row');
    let target = null;
    for (const row of rows) {
      if (row.getAttribute('data-cmd') === cmdName) { target = row; break; }
    }
    if (target) {
      document.querySelectorAll('.cmd-row').forEach(r => r.classList.remove('highlight'));
      target.classList.add('highlight', 'open');
      target.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    document.getElementById('autocompleteList').style.display = 'none';
  }, 50);
}

// Keyboard nav for autocomplete
document.addEventListener('keydown', e => {
  const list = document.getElementById('autocompleteList');
  if (list.style.display === 'none') return;
  const items = list.querySelectorAll('.autocomplete-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    acIndex = Math.min(acIndex + 1, items.length - 1);
    items.forEach((item, i) => item.classList.toggle('active', i === acIndex));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    acIndex = Math.max(acIndex - 1, 0);
    items.forEach((item, i) => item.classList.toggle('active', i === acIndex));
  } else if (e.key === 'Enter' && acIndex >= 0) {
    e.preventDefault();
    items[acIndex].click();
  } else if (e.key === 'Escape') {
    list.style.display = 'none';
  }
});

document.getElementById('searchInput').addEventListener('input', e => doSearch(e.target.value));
document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) {
    document.getElementById('autocompleteList').style.display = 'none';
  }
});

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
buildAllPanels();
buildSearchIndex();
</script>
