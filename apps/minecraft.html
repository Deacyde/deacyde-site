    .cmd-op.op2 { color: #fb923c; background: #2d1500; border-color: #5a2a00; }

    .cmd-syntax { font-family: 'Courier New', monospace; font-size: 0.78rem; color: #666; background: #0a0a0a; border-radius: 6px; padding: 0.4rem 0.6rem; border: 1px solid #1a1a1a; word-break: break-all; }
    .cmd-syntax .arg { color: #38bdf8; }

const OP_LABELS = { 4:'OP 4', 3:'OP 3', 2:'OP 2', 1:'OP 1', 0:'OP 0' };
const OP_CLASS  = { 4:'op4', 3:'op4', 2:'op2', 1:'op1', 0:'op0' };

const CATS = {
  player:      '👤 Player Management',
  items:       '🎒 Items & Inventory',
  world:       '🌍 World Editing',
  time:        '⏰ Time & Weather',
  server:      '🖥️ Server Control',
  permissions: '🔑 Permissions & Teams',
  entities:    '🐾 Entities & NBT',
  combat:      '⚔️ Combat & Gamerules',
  debug:       '🔧 Debug & Scripting',
};

let activeFilter = 'all';
let searchVal = '';

function opClass(op) { return OP_CLASS[op] || 'op0'; }

function buildCards(list) {
  if (!list.length) return '<div class="no-results">No commands match your search.</div>';
  const byCat = {};
  list.forEach(c => { (byCat[c.cat] = byCat[c.cat] || []).push(c); });
  return Object.entries(CATS)
    .filter(([k]) => byCat[k])
    .map(([k, label]) => `
      <div class="category-section" data-cat="${k}">
        <div class="category-title">${label}</div>
        <div class="cmd-grid">
          ${byCat[k].map(cmd => `
            <div class="cmd-card" onclick="copyCmd(this,'${cmd.syntax.replace(/'/g,"\\'")}')">
              <div class="cmd-top">
                <span class="cmd-name">${cmd.name}</span>
                <span class="cmd-op ${opClass(cmd.op)}">${OP_LABELS[cmd.op]}</span>
              </div>
              <div class="cmd-desc">${cmd.desc}</div>
              <div class="cmd-syntax">${fmtSyntax(cmd.syntax)}</div>
              <span class="copy-hint">click to copy</span>
            </div>`).join('')}
        </div>
      </div>`).join('');
}

function fmtSyntax(s) {
  return s
    .replace(/&lt;([^>]+)&gt;/g, '<span class="arg">&lt;$1&gt;</span>')
    .replace(/\[([^\]]+)\]/g, '<span class="opt">[$1]</span>')
    .replace(/<([^/][^>]*)>/g, '<span class="arg">&lt;$1&gt;</span>')
    .replace(/\[([^\]]+)\]/g, '<span class="opt">[$1]</span>');
}

function render() {
  const q = searchVal.toLowerCase();
  let list = CMDS.filter(c => {
    const matchCat = activeFilter === 'all' || c.cat === activeFilter;
    const matchQ = !q || c.name.toLowerCase().includes(q) || c.desc.toLowerCase().includes(q) || c.syntax.toLowerCase().includes(q);
    return matchCat && matchQ;
  });
  document.getElementById('main').innerHTML = buildCards(list);
}

function copyCmd(el, syntax) {
  navigator.clipboard.writeText('/' + syntax).catch(() => {});
  el.classList.add('copied');
  el.querySelector('.copy-hint').textContent = '✓ copied!';
  setTimeout(() => {
    el.classList.remove('copied');
    el.querySelector('.copy-hint').textContent = 'click to copy';
  }, 1500);
}

document.getElementById('search').addEventListener('input', e => {
  searchVal = e.target.value;
  render();
});

document.getElementById('filterBar').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.cat;
  render();
});

render();
</script>
</body>
</html>
