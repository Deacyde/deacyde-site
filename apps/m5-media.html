<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M5Core S3 Media — Deacyde Dev</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #e6edf3; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header a { color: #58a6ff; text-decoration: none; font-size: 14px; }
    header a:hover { text-decoration: underline; }
    header h1 { font-size: 20px; font-weight: 600; }
    header .sep { color: #484f58; }

    .container { max-width: 900px; margin: 0 auto; padding: 32px 16px; }

    .device-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #1c2128;
      border: 1px solid #30363d;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      color: #8b949e;
      margin-bottom: 28px;
    }
    .device-badge .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #3fb950;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media(max-width:640px){ .grid { grid-template-columns: 1fr; } }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      overflow: hidden;
    }
    .card-header {
      padding: 14px 18px;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-header h2 { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .card-body { padding: 18px; }

    /* Photo card */
    .photo-wrap {
      background: #0d1117;
      border-radius: 8px;
      aspect-ratio: 4/3;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
    }
    .photo-wrap .placeholder {
      text-align: center;
      color: #484f58;
    }
    .photo-wrap .placeholder svg { width: 48px; height: 48px; margin-bottom: 8px; }
    .photo-wrap .placeholder p { font-size: 13px; }

    /* Audio card */
    .audio-wrap {
      background: #0d1117;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 12px;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    audio { width: 100%; border-radius: 6px; }
    .audio-placeholder { text-align: center; color: #484f58; font-size: 13px; }
    .audio-placeholder svg { width: 48px; height: 48px; margin-bottom: 8px; display: block; margin: 0 auto 8px; }

    /* Meta row */
    .meta { font-size: 12px; color: #8b949e; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .meta .size { background: #21262d; border-radius: 4px; padding: 2px 7px; }

    /* Refresh */
    .refresh-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .refresh-row p { font-size: 13px; color: #8b949e; }
    .btn {
      background: #21262d;
      border: 1px solid #30363d;
      color: #e6edf3;
      padding: 7px 16px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: background .15s;
    }
    .btn:hover { background: #30363d; }
    .btn-green { background: #1a4731; border-color: #2ea043; color: #3fb950; }
    .btn-green:hover { background: #1f5c3a; }

    .status-msg {
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 6px;
      margin-top: 8px;
      display: none;
    }
    .status-msg.ok  { background: #1a4731; color: #3fb950; display: block; }
    .status-msg.err { background: #3d1a1a; color: #f85149; display: block; }

    footer {
      text-align: center;
      padding: 40px 16px 24px;
      color: #484f58;
      font-size: 13px;
    }
    footer a { color: #58a6ff; text-decoration: none; }
  </style>
</head>
<body>

<header>
  <a href="/">← dev.deacyde.com</a>
  <span class="sep">/</span>
  <h1>📷 M5Core S3 Media</h1>
</header>

<div class="container">

  <div class="device-badge">
    <span class="dot"></span>
    M5Stack Core S3 &nbsp;·&nbsp; core-s3
  </div>

  <div class="refresh-row">
    <p id="last-refresh">Never refreshed</p>
    <button class="btn btn-green" onclick="loadAll()">⟳ Refresh</button>
  </div>

  <div class="grid">

    <!-- Photo card -->
    <div class="card">
      <div class="card-header">
        <h2>📷 Latest Photo</h2>
        <a id="photo-dl" href="#" download="core-s3-photo.jpg" style="display:none; font-size:12px; color:#58a6ff;">Download</a>
      </div>
      <div class="card-body">
        <div class="photo-wrap" id="photo-wrap">
          <div class="placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z"/>
              <path d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zM18.75 10.5h.008v.008h-.008V10.5z"/>
            </svg>
            <p>No photo yet</p>
            <p>Tap CAM on the device</p>
          </div>
          <img id="photo-img" alt="Latest capture">
        </div>
        <div class="meta" id="photo-meta" style="display:none;">
          <span id="photo-time">—</span>
          <span class="size" id="photo-size">—</span>
        </div>
        <div class="status-msg" id="photo-status"></div>
      </div>
    </div>

    <!-- Audio card -->
    <div class="card">
      <div class="card-header">
        <h2>🎤 Latest Audio</h2>
        <a id="audio-dl" href="#" download="core-s3-audio.wav" style="display:none; font-size:12px; color:#58a6ff;">Download</a>
      </div>
      <div class="card-body">
        <div class="audio-wrap" id="audio-wrap">
          <div class="audio-placeholder" id="audio-placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"/>
            </svg>
            <p>No audio yet</p>
            <p>Tap MIC on the device</p>
          </div>
          <audio id="audio-player" controls style="display:none;"></audio>
        </div>
        <div class="meta" id="audio-meta" style="display:none;">
          <span id="audio-time">—</span>
          <span class="size" id="audio-size">—</span>
        </div>
        <div class="status-msg" id="audio-status"></div>
      </div>
    </div>

  </div>
</div>

<footer>
  <a href="/">dev.deacyde.com</a> &nbsp;·&nbsp; media served via <a href="https://pi.deacyde.com/status" target="_blank">pi.deacyde.com</a>
</footer>

<script>
  const PI = 'https://pi.deacyde.com';
  const DEVICE = 'core-s3';

  async function checkMedia(type) {
    const url = `${PI}/${type}/${DEVICE}?_=${Date.now()}`;
    try {
      const r = await fetch(url, { method: 'HEAD' });
      if (r.ok) return {
        ok: true, url,
        size: r.headers.get('content-length'),
        modified: r.headers.get('last-modified')
      };
      return { ok: false };
    } catch { return { ok: false }; }
  }

  async function loadPhoto() {
    const res = await checkMedia('camera');
    const img = document.getElementById('photo-img');
    const wrap = document.getElementById('photo-wrap');
    const ph = wrap.querySelector('.placeholder');
    const meta = document.getElementById('photo-meta');
    const dl = document.getElementById('photo-dl');
    const status = document.getElementById('photo-status');

    if (res.ok) {
      img.src = res.url;
      img.style.display = 'block';
      if (ph) ph.style.display = 'none';
      meta.style.display = 'flex';
      document.getElementById('photo-time').textContent = res.modified ? new Date(res.modified).toLocaleTimeString() : new Date().toLocaleTimeString();
      document.getElementById('photo-size').textContent = res.size ? Math.round(res.size/1024) + ' KB' : '';
      dl.href = res.url;
      dl.style.display = 'inline';
      status.className = 'status-msg ok';
      status.textContent = '✓ Photo loaded';
      setTimeout(() => status.className = 'status-msg', 3000);
    } else {
      status.className = 'status-msg err';
      status.textContent = 'No photo on server yet';
      setTimeout(() => status.className = 'status-msg', 4000);
    }
  }

  async function loadAudio() {
    const res = await checkMedia('audio');
    const player = document.getElementById('audio-player');
    const ph = document.getElementById('audio-placeholder');
    const meta = document.getElementById('audio-meta');
    const dl = document.getElementById('audio-dl');
    const status = document.getElementById('audio-status');

    if (res.ok) {
      player.src = res.url;
      player.style.display = 'block';
      ph.style.display = 'none';
      meta.style.display = 'flex';
      document.getElementById('audio-time').textContent = res.modified ? new Date(res.modified).toLocaleTimeString() : new Date().toLocaleTimeString();
      document.getElementById('audio-size').textContent = res.size ? Math.round(res.size/1024) + ' KB' : '';
      dl.href = res.url;
      dl.style.display = 'inline';
      status.className = 'status-msg ok';
      status.textContent = '✓ Audio loaded';
      setTimeout(() => status.className = 'status-msg', 3000);
    } else {
      status.className = 'status-msg err';
      status.textContent = 'No audio on server yet';
      setTimeout(() => status.className = 'status-msg', 4000);
    }
  }

  function loadAll() {
    document.getElementById('last-refresh').textContent = 'Last refreshed: ' + new Date().toLocaleTimeString();
    loadPhoto();
    loadAudio();
  }

  loadAll();
  // Auto-refresh every 30s
  setInterval(loadAll, 30000);
</script>
</body>
</html>
