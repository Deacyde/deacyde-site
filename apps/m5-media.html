<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M5Core S3 Media — Deacyde Dev</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #e6edf3; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
    header { background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
    header a { color: #58a6ff; text-decoration: none; font-size: 14px; }
    header a:hover { text-decoration: underline; }
    header h1 { font-size: 20px; font-weight: 600; }
    header .sep { color: #484f58; }
    .container { max-width: 1100px; margin: 0 auto; padding: 28px 16px 60px; }
    .device-badge { display: inline-flex; align-items: center; gap: 8px; background: #1c2128; border: 1px solid #30363d; border-radius: 20px; padding: 6px 14px; font-size: 13px; color: #8b949e; margin-bottom: 24px; }
    .device-badge .dot { width: 8px; height: 8px; border-radius: 50%; background: #3fb950; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 10px; }
    .topbar p { font-size: 13px; color: #8b949e; }
    .btn { background: #21262d; border: 1px solid #30363d; color: #e6edf3; padding: 7px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; transition: background .15s; }
    .btn:hover { background: #30363d; }
    .btn-green { background: #1a4731; border-color: #2ea043; color: #3fb950; }
    .btn-green:hover { background: #1f5c3a; }
    .section-title { font-size: 16px; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .section-title .count { font-size: 12px; color: #8b949e; background: #21262d; border-radius: 10px; padding: 2px 8px; font-weight: 400; }
    .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 40px; }
    .photo-item { background: #161b22; border: 1px solid #30363d; border-radius: 10px; overflow: hidden; }
    .photo-item.latest { border-color: #58a6ff; }
    .photo-thumb { position: relative; aspect-ratio: 4/3; background: #0d1117; cursor: pointer; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: none; transition: transform .2s; }
    .photo-thumb img.loaded { display: block; }
    .photo-thumb:hover img.loaded { transform: scale(1.04); }
    .no-img { color: #484f58; font-size: 12px; text-align: center; }
    .badge { position: absolute; top: 6px; left: 6px; background: rgba(0,0,0,.75); color: #58a6ff; font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 10px; }
    .badge.lb { background: #1158b0; color: #fff; }
    .photo-meta { padding: 8px 10px; display: flex; align-items: center; justify-content: space-between; gap: 6px; }
    .photo-meta .time { font-size: 11px; color: #8b949e; }
    .photo-meta a { font-size: 11px; color: #58a6ff; text-decoration: none; }
    .photo-meta a:hover { text-decoration: underline; }
    .audio-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 40px; }
    .audio-item { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 14px 16px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    .audio-item.latest { border-color: #58a6ff; }
    .audio-num { font-size: 12px; color: #58a6ff; font-weight: 600; min-width: 52px; }
    .audio-player-wrap { flex: 1; min-width: 200px; }
    audio { width: 100%; border-radius: 6px; }
    .audio-info { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .audio-info .time { font-size: 12px; color: #8b949e; }
    .audio-info .sz { font-size: 11px; background: #21262d; border-radius: 4px; padding: 2px 7px; color: #8b949e; }
    .audio-info a { font-size: 12px; color: #58a6ff; text-decoration: none; }
    .audio-info a:hover { text-decoration: underline; }
    .placeholder-msg { text-align: center; padding: 40px; color: #484f58; font-size: 14px; background: #161b22; border: 1px solid #30363d; border-radius: 10px; margin-bottom: 40px; }
    footer { text-align: center; padding: 20px; color: #484f58; font-size: 13px; border-top: 1px solid #21262d; }
    footer a { color: #58a6ff; text-decoration: none; }
    #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.92); z-index: 100; align-items: center; justify-content: center; cursor: zoom-out; }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 95vw; max-height: 95vh; object-fit: contain; border-radius: 6px; }
    .btn-red { background: #3d1a1a; border-color: #b91c1c; color: #f87171; }
    .btn-red:hover { background: #4d2020; }
    .btn-red:disabled { opacity: .4; cursor: default; }
    .delete-bar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; min-height: 32px; }
    .select-check { width: 16px; height: 16px; cursor: pointer; accent-color: #58a6ff; }
    .photo-item .cb-wrap { padding: 8px 10px 0; display: flex; align-items: center; gap: 6px; }
    .photo-item .cb-wrap label { font-size: 12px; color: #8b949e; cursor: pointer; }
    .audio-item .cb-wrap { display: flex; align-items: center; gap: 6px; }
    .audio-item .cb-wrap label { font-size: 12px; color: #8b949e; cursor: pointer; }
    .photo-item.selected { border-color: #f87171; }
    .audio-item.selected { border-color: #f87171; }
  </style>
</head>
<body>
<header>
  <a href="/">&#8592; dev.deacyde.com</a>
  <span class="sep">/</span>
  <h1>&#128247; M5Core S3 Media</h1>
</header>
<div class="container">
  <div class="device-badge"><span class="dot"></span>M5Stack Core S3 &nbsp;&middot;&nbsp; core-s3</div>
  <div class="topbar">
    <p id="last-refresh">Never refreshed</p>
    <button class="btn btn-green" onclick="loadAll()">&#x27F3; Refresh</button>
  </div>
  <div class="section-title">&#128247; Photos <span class="count" id="photo-count">&#8212;</span></div>
  <div class="delete-bar" id="photo-delete-bar" style="display:none">
    <button class="btn btn-red" id="photo-del-sel" onclick="deleteSelected('camera')" disabled>&#128465; Delete Selected</button>
    <button class="btn btn-red" onclick="deleteAll('camera')">&#128465; Delete All Photos</button>
  </div>
  <div id="photo-gallery"></div>
  <div class="section-title">&#127908; Audio Recordings <span class="count" id="audio-count">&#8212;</span></div>
  <div class="delete-bar" id="audio-delete-bar" style="display:none">
    <button class="btn btn-red" id="audio-del-sel" onclick="deleteSelected('audio')" disabled>&#128465; Delete Selected</button>
    <button class="btn btn-red" onclick="deleteAll('audio')">&#128465; Delete All Audio</button>
  </div>
  <div id="audio-gallery"></div>
</div>
<footer><a href="/">dev.deacyde.com</a> &nbsp;&middot;&nbsp; media via <a href="https://pi.deacyde.com/status" target="_blank">pi.deacyde.com</a></footer>
<div id="lightbox" onclick="closeLightbox()"><img id="lb-img" src="" alt="full photo"></div>
<script>
const PI = 'https://pi.deacyde.com';
const DEVICE = 'core-s3';

function fmtTime(iso) {
  try { return new Date(iso).toLocaleString(undefined,{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
  catch(e) { return iso; }
}
function fmtSize(b) { return b > 1024 ? Math.round(b/1024)+' KB' : b+' B'; }

function makePhotoItem(f) {
  const url = PI+'/camera/'+DEVICE+'/'+f.n+'?_='+Date.now();
  const wrap = document.createElement('div');
  wrap.className = 'photo-item'+(f.n===1?' latest':'');
  wrap.dataset.n = f.n;

  const cbWrap = document.createElement('div');
  cbWrap.className = 'cb-wrap';
  const cb = document.createElement('input');
  cb.type = 'checkbox'; cb.className = 'select-check'; cb.id = 'photo-cb-'+f.n;
  cb.addEventListener('change', function(){ wrap.classList.toggle('selected', cb.checked); updateDelSelBtn('camera'); });
  const lbl = document.createElement('label'); lbl.htmlFor = 'photo-cb-'+f.n; lbl.textContent = 'Select';
  cbWrap.appendChild(cb); cbWrap.appendChild(lbl);
  wrap.appendChild(cbWrap);

  const thumb = document.createElement('div');
  thumb.className = 'photo-thumb';
  thumb.onclick = function(){ openLightbox(url); };

  const badge = document.createElement('span');
  badge.className = 'badge'+(f.n===1?' lb':'');
  badge.textContent = f.n===1 ? 'latest' : '#'+f.n;
  thumb.appendChild(badge);

  const noimg = document.createElement('div');
  noimg.className = 'no-img';
  noimg.textContent = 'loading...';
  thumb.appendChild(noimg);

  const img = document.createElement('img');
  img.alt = 'photo '+f.n;
  img.onload = function(){ img.classList.add('loaded'); noimg.style.display='none'; };
  img.onerror = function(){ noimg.textContent='unavailable'; };
  img.src = url;
  thumb.appendChild(img);
  wrap.appendChild(thumb);

  const meta = document.createElement('div');
  meta.className = 'photo-meta';
  const t = document.createElement('span');
  t.className = 'time';
  t.textContent = fmtTime(f.mtime);
  const dl = document.createElement('a');
  dl.href = url;
  dl.download = 'core-s3-photo-'+f.n+'.jpg';
  dl.textContent = '\u2193 '+fmtSize(f.size);
  meta.appendChild(t);
  meta.appendChild(dl);
  wrap.appendChild(meta);
  return wrap;
}

function makeAudioItem(f) {
  const url = PI+'/audio/'+DEVICE+'/'+f.n+'?_='+Date.now();
  const wrap = document.createElement('div');
  wrap.className = 'audio-item'+(f.n===1?' latest':'');
  wrap.dataset.n = f.n;

  const cbWrap = document.createElement('div');
  cbWrap.className = 'cb-wrap';
  const cb = document.createElement('input');
  cb.type = 'checkbox'; cb.className = 'select-check'; cb.id = 'audio-cb-'+f.n;
  cb.addEventListener('change', function(){ wrap.classList.toggle('selected', cb.checked); updateDelSelBtn('audio'); });
  const lbl = document.createElement('label'); lbl.htmlFor = 'audio-cb-'+f.n; lbl.textContent = 'Select';
  cbWrap.appendChild(cb); cbWrap.appendChild(lbl);
  wrap.appendChild(cbWrap);

  const num = document.createElement('div');
  num.className = 'audio-num';
  num.textContent = f.n===1 ? '\u25B6 latest' : '#'+f.n;
  wrap.appendChild(num);

  const pw = document.createElement('div');
  pw.className = 'audio-player-wrap';
  const aud = document.createElement('audio');
  aud.controls = true;
  aud.src = url;
  pw.appendChild(aud);
  wrap.appendChild(pw);

  const info = document.createElement('div');
  info.className = 'audio-info';
  const t = document.createElement('span'); t.className='time'; t.textContent=fmtTime(f.mtime);
  const sz = document.createElement('span'); sz.className='sz'; sz.textContent=fmtSize(f.size);
  const dl = document.createElement('a'); dl.href=url; dl.download='core-s3-audio-'+f.n+'.wav'; dl.textContent='\u2193 download';
  info.appendChild(t); info.appendChild(sz); info.appendChild(dl);
  wrap.appendChild(info);
  return wrap;
}

async function loadPhotos() {
  const el = document.getElementById('photo-gallery');
  const cnt = document.getElementById('photo-count');
  try {
    const r = await fetch(PI+'/camera/'+DEVICE+'/list?_='+Date.now());
    if (!r.ok) throw new Error('HTTP '+r.status);
    const {files} = await r.json();
    cnt.textContent = files.length+' / 5';
    el.innerHTML = '';
    document.getElementById('photo-delete-bar').style.display = files.length ? '' : 'none';
    if (!files.length) { el.innerHTML='<div class="placeholder-msg">No photos yet &mdash; tap CAM on the device</div>'; return; }
    const grid = document.createElement('div'); grid.className='photo-grid';
    files.forEach(function(f){ grid.appendChild(makePhotoItem(f)); });
    el.appendChild(grid);
  } catch(e) {
    cnt.textContent='error';
    el.innerHTML='<div class="placeholder-msg">Could not reach pi.deacyde.com &mdash; '+e.message+'</div>';
  }
}

async function loadAudios() {
  const el = document.getElementById('audio-gallery');
  const cnt = document.getElementById('audio-count');
  try {
    const r = await fetch(PI+'/audio/'+DEVICE+'/list?_='+Date.now());
    if (!r.ok) throw new Error('HTTP '+r.status);
    const {files} = await r.json();
    cnt.textContent = files.length+' / 5';
    el.innerHTML = '';
    document.getElementById('audio-delete-bar').style.display = files.length ? '' : 'none';
    if (!files.length) { el.innerHTML='<div class="placeholder-msg">No audio yet &mdash; tap MIC on the device</div>'; return; }
    const list = document.createElement('div'); list.className='audio-list';
    files.forEach(function(f){ list.appendChild(makeAudioItem(f)); });
    el.appendChild(list);
  } catch(e) {
    cnt.textContent='error';
    el.innerHTML='<div class="placeholder-msg">Could not reach pi.deacyde.com &mdash; '+e.message+'</div>';
  }
}

function updateDelSelBtn(type) {
  const sel = document.querySelectorAll('#'+(type==='camera'?'photo':'audio')+'-gallery .selected');
  const btn = document.getElementById((type==='camera'?'photo':'audio')+'-del-sel');
  if (btn) btn.disabled = sel.length === 0;
}

async function deleteSelected(type) {
  const gallery = document.getElementById((type==='camera'?'photo':'audio')+'-gallery');
  const selected = Array.from(gallery.querySelectorAll('.selected'));
  if (!selected.length) return;
  if (!confirm('Delete '+selected.length+' selected '+(type==='camera'?'photo':'audio')+(selected.length>1?'s':'')+' permanently?')) return;
  const ns = selected.map(el => el.dataset.n);
  await Promise.all(ns.map(n => fetch(PI+'/'+type+'/'+DEVICE+'/'+n, {method:'DELETE'})));
  type === 'camera' ? loadPhotos() : loadAudios();
}

async function deleteAll(type) {
  const label = type === 'camera' ? 'all photos' : 'all audio recordings';
  if (!confirm('Delete '+label+' permanently?')) return;
  await fetch(PI+'/'+type+'/'+DEVICE+'/all', {method:'DELETE'});
  type === 'camera' ? loadPhotos() : loadAudios();
}

function loadAll() {
  document.getElementById('last-refresh').textContent='Last refreshed: '+new Date().toLocaleTimeString();
  loadPhotos();
  loadAudios();
}
function openLightbox(url){ document.getElementById('lb-img').src=url; document.getElementById('lightbox').classList.add('open'); }
function closeLightbox(){ document.getElementById('lightbox').classList.remove('open'); document.getElementById('lb-img').src=''; }
document.addEventListener('keydown',function(e){ if(e.key==='Escape') closeLightbox(); });
loadAll();
setInterval(loadAll,30000);
</script>
</body>
</html>
