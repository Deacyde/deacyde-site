<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbit Watch — What's In Space Above Me?</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/satellite.js@5.0.0/dist/satellite.min.js"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: { 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' } } } } }
  </script>
  <style>
    #map { height: 100%; width: 100%; }
    .leaflet-popup-content-wrapper { background: #1f2937; color: #e5e7eb; border: 1px solid #374151; border-radius: 12px; }
    .leaflet-popup-tip { background: #1f2937; }
    .leaflet-popup-content { margin: 10px 14px; font-size: 13px; line-height: 1.6; }
    .info-label { color: #9ca3af; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
    .info-value { color: #fff; font-weight: 600; }
    .loader { border: 3px solid #374151; border-top: 3px solid #6366f1; border-radius: 50%; width: 40px; height: 40px; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .sat-label { background: transparent !important; border: none !important; box-shadow: none !important; color: #9ca3af; font-size: 10px; white-space: nowrap; }
  </style>
</head>
<body class="bg-gray-950 text-white h-screen flex flex-col overflow-hidden">

  <!-- Header -->
  <header class="bg-gray-900 border-b border-gray-800 px-4 py-3 flex items-center justify-between shrink-0 z-20">
    <div class="flex items-center gap-3">
      <h1 class="text-lg font-bold">🛰️ Orbit Watch</h1>
      <span id="status-badge" class="text-xs px-2 py-1 rounded-full bg-gray-800 text-gray-400 border border-gray-700">Locating...</span>
    </div>
    <div class="flex items-center gap-3">
      <div class="flex items-center gap-2">
        <label class="text-xs text-gray-400">Show:</label>
        <select id="category-select" onchange="refresh()" class="text-xs px-2 py-1 bg-gray-800 border border-gray-700 rounded-lg text-white">
          <option value="all" selected>All Objects</option>
          <option value="stations">Space Stations</option>
          <option value="starlink">Starlink</option>
          <option value="active">Active Satellites</option>
          <option value="weather">Weather Sats</option>
          <option value="gps">GPS/Navigation</option>
          <option value="science">Science</option>
        </select>
      </div>
      <div class="flex items-center gap-2">
        <label class="text-xs text-gray-400">Radius:</label>
        <select id="radius-select" onchange="refresh()" class="text-xs px-2 py-1 bg-gray-800 border border-gray-700 rounded-lg text-white">
          <option value="45">Low orbit only</option>
          <option value="70" selected>Medium view</option>
          <option value="85">Wide view</option>
        </select>
      </div>
      <button onclick="refresh()" class="px-3 py-1.5 text-xs bg-brand-600 hover:bg-brand-700 text-white font-medium rounded-lg transition">
        🔄 Refresh
      </button>
      <span id="obj-count" class="text-xs text-gray-400"></span>
    </div>
  </header>

  <!-- Loading overlay -->
  <div id="loading" class="absolute inset-0 z-30 bg-gray-950/90 flex flex-col items-center justify-center gap-4">
    <div class="loader"></div>
    <p id="loading-text" class="text-gray-400 text-sm">Getting your location...</p>
  </div>

  <!-- Map -->
  <div id="map" class="flex-1 z-10"></div>

  <!-- Detail panel -->
  <div id="detail-panel" class="hidden absolute bottom-0 left-0 right-0 z-20 bg-gray-900 border-t border-gray-700 p-4 max-h-[40vh] overflow-y-auto">
    <div class="flex justify-between items-start mb-3">
      <h2 id="detail-title" class="text-lg font-bold"></h2>
      <button onclick="closeDetail()" class="text-gray-400 hover:text-white text-xl">&times;</button>
    </div>
    <div id="detail-body" class="grid grid-cols-2 sm:grid-cols-4 gap-3"></div>
  </div>

<script>
  let map, userMarker, satMarkers = [], userLat, userLon, tleCache = {};
  const CELESTRAK_BASE = "https://celestrak.org/NORAD/elements/gp.php";

  // TLE category URLs from CelesTrak
  const CATEGORIES = {
    stations:  "stations",
    starlink:  "supplemental/starlink",  // Note: large dataset
    active:    "active",
    weather:   "weather",
    gps:       "gnss",
    science:   "science",
  };

  // Icons by category
  function satIcon(category, name) {
    let emoji = '🛰️';
    let color = '#60a5fa';
    const n = (name || '').toUpperCase();
    if (n.includes('ISS') || n.includes('ZARYA') || n.includes('TIANGONG')) { emoji = '🏠'; color = '#fbbf24'; }
    else if (n.includes('STARLINK')) { emoji = '📡'; color = '#a78bfa'; }
    else if (n.includes('GPS') || n.includes('NAVSTAR') || n.includes('GALILEO') || n.includes('BEIDOU') || n.includes('GLONASS')) { emoji = '📍'; color = '#34d399'; }
    else if (n.includes('NOAA') || n.includes('GOES') || n.includes('METEOSAT') || n.includes('METEOR')) { emoji = '🌤️'; color = '#38bdf8'; }
    else if (n.includes('HUBBLE') || n.includes('CHANDRA') || n.includes('JAMES WEBB') || n.includes('JWST')) { emoji = '🔭'; color = '#f472b6'; }
    else if (category === 'debris' || n.includes('DEB') || n.includes('R/B')) { emoji = '💀'; color = '#ef4444'; }

    return {
      icon: L.divIcon({
        className: '',
        html: `<div style="font-size:18px;filter:drop-shadow(0 0 4px ${color});text-align:center;">${emoji}</div>`,
        iconSize: [22, 22],
        iconAnchor: [11, 11],
      }),
      color,
    };
  }

  function initMap(lat, lon) {
    map = L.map('map', { zoomControl: false }).setView([lat, lon], 6);
    L.control.zoom({ position: 'topright' }).addTo(map);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; CARTO | TLEs: CelesTrak',
      maxZoom: 18,
    }).addTo(map);

    userMarker = L.circleMarker([lat, lon], {
      radius: 8, fillColor: '#6366f1', fillOpacity: 1, color: '#fff', weight: 2,
    }).addTo(map).bindPopup('<strong>📍 You are here</strong>');

    // Horizon circle (objects above ~10° elevation)
    L.circle([lat, lon], {
      radius: 2000 * 1000, // ~2000km visual range
      color: '#6366f1', fillColor: '#6366f1', fillOpacity: 0.02, weight: 1, dashArray: '5,5',
    }).addTo(map);
  }

  // Fetch TLEs from CelesTrak
  async function fetchTLEs(category) {
    if (category === 'all') {
      // Fetch stations + a sample of active satellites (avoid huge downloads)
      const [stations, active] = await Promise.all([
        fetchTLEsForGroup('stations'),
        fetchTLEsForGroup('active'),
      ]);
      return [...stations, ...active];
    }
    return fetchTLEsForGroup(CATEGORIES[category] || category);
  }

  async function fetchTLEsForGroup(group) {
    const cacheKey = group;
    if (tleCache[cacheKey] && (Date.now() - tleCache[cacheKey].time < 300000)) {
      return tleCache[cacheKey].data;
    }

    let url;
    if (group.includes('/')) {
      url = `https://celestrak.org/NORAD/elements/${group}.txt`;
    } else {
      url = `${CELESTRAK_BASE}?GROUP=${group}&FORMAT=tle`;
    }

    const res = await fetch(url);
    if (!res.ok) throw new Error(`CelesTrak returned ${res.status}`);
    const text = await res.text();
    const lines = text.trim().split('\n');
    const sats = [];

    for (let i = 0; i < lines.length - 2; i += 3) {
      const name = lines[i].trim();
      const tle1 = lines[i + 1].trim();
      const tle2 = lines[i + 2].trim();
      if (tle1.startsWith('1 ') && tle2.startsWith('2 ')) {
        sats.push({ name, tle1, tle2 });
      }
    }

    tleCache[cacheKey] = { data: sats, time: Date.now() };
    return sats;
  }

  // Compute satellite position using satellite.js
  function computePosition(sat) {
    try {
      const satrec = satellite.twoline2satrec(sat.tle1, sat.tle2);
      const now = new Date();
      const posVel = satellite.propagate(satrec, now);
      if (!posVel.position) return null;

      const gmst = satellite.gstime(now);
      const geo = satellite.eciToGeodetic(posVel.position, gmst);

      return {
        lat: satellite.degreesLat(geo.latitude),
        lon: satellite.degreesLong(geo.longitude),
        altKm: geo.height,
        velocity: posVel.velocity ? Math.sqrt(
          posVel.velocity.x ** 2 + posVel.velocity.y ** 2 + posVel.velocity.z ** 2
        ) : null,
      };
    } catch {
      return null;
    }
  }

  // Check if satellite is "above" user (within max zenith angle)
  function isOverhead(satPos, maxZenithDeg) {
    const dLat = satPos.lat - userLat;
    const dLon = satPos.lon - userLon;
    const degDist = Math.sqrt(dLat * dLat + dLon * dLon);
    // Rough approximation: at LEO (~400km), 1° ≈ 111km ground
    // Max ground distance for a satellite to be "overhead" depends on altitude
    const altKm = satPos.altKm || 400;
    const maxGroundDeg = (altKm * Math.tan(maxZenithDeg * Math.PI / 180)) / 111;
    return degDist < maxGroundDeg;
  }

  // Compute elevation angle from user to satellite
  function elevationAngle(satPos) {
    const R = 6371; // Earth radius km
    const dLat = (satPos.lat - userLat) * Math.PI / 180;
    const dLon = (satPos.lon - userLon) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(userLat*Math.PI/180) * Math.cos(satPos.lat*Math.PI/180) * Math.sin(dLon/2)**2;
    const groundDist = 2 * R * Math.asin(Math.sqrt(a));
    const altKm = satPos.altKm || 400;
    const elevRad = Math.atan2(altKm, groundDist);
    return elevRad * 180 / Math.PI;
  }

  function renderSatellites(sats, positions) {
    satMarkers.forEach(m => map.removeLayer(m));
    satMarkers = [];

    const category = document.getElementById('category-select').value;

    for (let i = 0; i < sats.length; i++) {
      const sat = sats[i];
      const pos = positions[i];
      if (!pos) continue;

      const { icon } = satIcon(category, sat.name);
      const marker = L.marker([pos.lat, pos.lon], { icon }).addTo(map);

      // Only show labels for notable objects
      const notable = sat.name.includes('ISS') || sat.name.includes('TIANGONG') ||
                       sat.name.includes('HUBBLE') || sat.name.includes('CSS');
      if (notable) {
        marker.bindTooltip(sat.name, {
          permanent: true, direction: 'right', className: 'sat-label', offset: [10, 0],
        });
      } else {
        marker.bindTooltip(sat.name, {
          permanent: false, direction: 'top', className: 'bg-gray-800 text-white text-xs px-2 py-1 rounded border border-gray-700',
        });
      }

      marker.on('click', () => showDetail(sat, pos));
      satMarkers.push(marker);
    }

    const badge = document.getElementById('status-badge');
    badge.textContent = `${positions.filter(Boolean).length} objects`;
    badge.className = 'text-xs px-2 py-1 rounded-full bg-green-900/50 text-green-400 border border-green-700';
    document.getElementById('obj-count').textContent = `Updated ${new Date().toLocaleTimeString()}`;
  }

  function showDetail(sat, pos) {
    const panel = document.getElementById('detail-panel');
    document.getElementById('detail-title').textContent = sat.name;

    const elev = elevationAngle(pos);
    const elevLabel = elev > 60 ? 'Nearly overhead' : elev > 30 ? 'High in sky' : elev > 10 ? 'Low on horizon' : 'Near horizon';
    const speedKmh = pos.velocity ? Math.round(pos.velocity * 3600) : null;
    const speedMph = speedKmh ? Math.round(speedKmh * 0.621371) : null;
    const orbitMins = pos.altKm ? Math.round(2 * Math.PI * Math.sqrt(((6371 + pos.altKm) ** 3) / 398600) / 60) : null;

    // Extract NORAD ID from TLE
    const noradId = sat.tle1 ? sat.tle1.substring(2, 7).trim() : '';

    document.getElementById('detail-body').innerHTML = `
      <div><div class="info-label">Altitude</div><div class="info-value">${pos.altKm ? Math.round(pos.altKm).toLocaleString() + ' km' : '—'} <span class="text-gray-400 text-xs">(${pos.altKm ? Math.round(pos.altKm * 0.621371).toLocaleString() + ' mi' : ''})</span></div></div>
      <div><div class="info-label">Speed</div><div class="info-value">${speedKmh ? speedKmh.toLocaleString() + ' km/h' : '—'} <span class="text-gray-400 text-xs">(${speedMph ? speedMph.toLocaleString() + ' mph' : ''})</span></div></div>
      <div><div class="info-label">Elevation</div><div class="info-value">${Math.round(elev)}° <span class="text-gray-400 text-xs">${elevLabel}</span></div></div>
      <div><div class="info-label">Orbital Period</div><div class="info-value">${orbitMins ? orbitMins + ' min' : '—'}</div></div>
      <div><div class="info-label">Latitude</div><div class="info-value">${pos.lat.toFixed(4)}°</div></div>
      <div><div class="info-label">Longitude</div><div class="info-value">${pos.lon.toFixed(4)}°</div></div>
      <div><div class="info-label">NORAD ID</div><div class="info-value font-mono">${noradId}</div></div>
      <div><div class="info-label">Visibility</div><div class="info-value">${isInSunlight(pos) ? '☀️ In sunlight (may be visible)' : '🌑 In shadow'}</div></div>
    `;
    panel.classList.remove('hidden');
  }

  // Rough check if satellite is in sunlight (above Earth's shadow)
  function isInSunlight(pos) {
    const now = new Date();
    const hour = now.getUTCHours() + pos.lon / 15;
    const localHour = ((hour % 24) + 24) % 24;
    // Very rough: if local solar time is between 6-18, likely in sunlight
    // Higher altitude sats stay in sunlight longer
    const altFactor = Math.min((pos.altKm || 400) / 1000, 3);
    return localHour > (6 - altFactor) && localHour < (18 + altFactor);
  }

  function closeDetail() {
    document.getElementById('detail-panel').classList.add('hidden');
  }

  async function refresh() {
    const badge = document.getElementById('status-badge');
    badge.textContent = 'Scanning orbits...';
    badge.className = 'text-xs px-2 py-1 rounded-full bg-yellow-900/50 text-yellow-400 border border-yellow-700';

    try {
      const category = document.getElementById('category-select').value;
      const maxZenith = parseInt(document.getElementById('radius-select').value);

      const allSats = await fetchTLEs(category);

      // Compute positions and filter overhead
      const overhead = [];
      const overheadPos = [];

      // Limit Starlink to avoid freezing (thousands of sats)
      const limit = category === 'starlink' ? 500 : allSats.length;
      const toProcess = allSats.slice(0, limit);

      for (const sat of toProcess) {
        const pos = computePosition(sat);
        if (pos && isOverhead(pos, maxZenith)) {
          overhead.push(sat);
          overheadPos.push(pos);
        }
      }

      renderSatellites(overhead, overheadPos);
    } catch (err) {
      badge.textContent = 'Error';
      badge.className = 'text-xs px-2 py-1 rounded-full bg-red-900/50 text-red-400 border border-red-700';
      console.error(err);
    }
  }

  let autoRefresh;
  function startAutoRefresh() {
    if (autoRefresh) clearInterval(autoRefresh);
    autoRefresh = setInterval(refresh, 30000); // every 30s
  }

  async function init() {
    const loading = document.getElementById('loading');
    const loadingText = document.getElementById('loading-text');

    try {
      loadingText.textContent = 'Getting your location...';
      const pos = await new Promise((resolve, reject) => {
        navigator.geolocation.getCurrentPosition(resolve, reject, {
          enableHighAccuracy: true, timeout: 10000,
        });
      });

      userLat = pos.coords.latitude;
      userLon = pos.coords.longitude;

      loadingText.textContent = 'Loading map...';
      initMap(userLat, userLon);

      loadingText.textContent = 'Downloading orbital data from CelesTrak...';
      await refresh();

      loading.classList.add('hidden');
      startAutoRefresh();
    } catch (err) {
      loadingText.textContent = `Error: ${err.message}. Please allow location access and refresh.`;
      console.error(err);
    }
  }

  // Legend
  window.addEventListener('load', () => {
    init();
    setTimeout(() => {
      if (!map) return;
      const legend = L.control({ position: 'bottomleft' });
      legend.onAdd = () => {
        const div = L.DomUtil.create('div', 'bg-gray-900/90 backdrop-blur border border-gray-700 rounded-lg p-3 text-xs');
        div.innerHTML = `
          <div class="font-semibold text-gray-200 mb-1.5">Object Types</div>
          <div class="flex flex-col gap-1">
            <div class="flex items-center gap-2">🏠 <span class="text-gray-300">Space Stations (ISS, Tiangong)</span></div>
            <div class="flex items-center gap-2">📡 <span class="text-gray-300">Starlink</span></div>
            <div class="flex items-center gap-2">📍 <span class="text-gray-300">GPS/Navigation</span></div>
            <div class="flex items-center gap-2">🌤️ <span class="text-gray-300">Weather Satellites</span></div>
            <div class="flex items-center gap-2">🔭 <span class="text-gray-300">Science/Telescopes</span></div>
            <div class="flex items-center gap-2">🛰️ <span class="text-gray-300">Other Satellites</span></div>
          </div>
        `;
        return div;
      };
      legend.addTo(map);
    }, 500);
  });
</script>
</body>
</html>
