<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sky Tracker — What's Flying Above Me?</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' }
          }
        }
      }
    }
  </script>
  <style>
    #map { height: 100%; width: 100%; }
    .plane-icon { font-size: 20px; line-height: 1; text-align: center; }
    .leaflet-popup-content-wrapper { background: #1f2937; color: #e5e7eb; border: 1px solid #374151; border-radius: 12px; }
    .leaflet-popup-tip { background: #1f2937; }
    .leaflet-popup-content { margin: 10px 14px; font-size: 13px; line-height: 1.6; }
    .info-label { color: #9ca3af; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
    .info-value { color: #fff; font-weight: 600; }
    .loader { border: 3px solid #374151; border-top: 3px solid #6366f1; border-radius: 50%; width: 40px; height: 40px; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-950 text-white h-screen flex flex-col overflow-hidden">

  <!-- Header -->
  <header class="bg-gray-900 border-b border-gray-800 px-4 py-3 flex items-center justify-between shrink-0 z-20">
    <div class="flex items-center gap-3">
      <h1 class="text-lg font-bold">✈️ Sky Tracker</h1>
      <span id="status-badge" class="text-xs px-2 py-1 rounded-full bg-gray-800 text-gray-400 border border-gray-700">Locating...</span>
    </div>
    <div class="flex items-center gap-3">
      <div class="flex items-center gap-2">
        <label class="text-xs text-gray-400">Radius:</label>
        <select id="radius-select" onchange="refresh()" class="text-xs px-2 py-1 bg-gray-800 border border-gray-700 rounded-lg text-white">
          <option value="25">25 mi</option>
          <option value="50" selected>50 mi</option>
          <option value="100">100 mi</option>
          <option value="200">200 mi</option>
        </select>
      </div>
      <button onclick="refresh()" class="px-3 py-1.5 text-xs bg-brand-600 hover:bg-brand-700 text-white font-medium rounded-lg transition">
        🔄 Refresh
      </button>
      <button id="ufo-toggle" onclick="toggleUFO()" class="px-3 py-1.5 text-xs bg-gray-800 hover:bg-gray-700 text-gray-300 font-medium rounded-lg transition border border-gray-700" title="Show nearby UFO sightings from NUFORC">
        👽 UFO Sightings
      </button>
      <span id="plane-count" class="text-xs text-gray-400"></span>
    </div>
  </header>

  <!-- Loading overlay -->
  <div id="loading" class="absolute inset-0 z-30 bg-gray-950/90 flex flex-col items-center justify-center gap-4">
    <div class="loader" id="loading-spinner"></div>
    <p id="loading-text" class="text-gray-400 text-sm">Getting your location...</p>
    <div id="manual-location" class="hidden flex-col items-center gap-2 text-sm">
      <p class="text-yellow-400">Enter your coordinates manually:</p>
      <div class="flex gap-2">
        <input id="manual-lat" type="number" step="0.0001" placeholder="Latitude e.g. 39.5" class="bg-gray-800 border border-gray-600 text-white px-2 py-1 rounded w-40 text-sm" />
        <input id="manual-lon" type="number" step="0.0001" placeholder="Longitude e.g. -98.3" class="bg-gray-800 border border-gray-600 text-white px-2 py-1 rounded w-44 text-sm" />
      </div>
      <button onclick="useManualLocation()" class="px-4 py-1.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded text-sm font-medium">Go</button>
    </div>
  </div>

  <!-- Map -->
  <div id="map" class="flex-1 z-10"></div>

  <!-- Flight detail panel -->
  <div id="detail-panel" class="hidden absolute bottom-0 left-0 right-0 z-20 bg-gray-900 border-t border-gray-700 p-4 max-h-[40vh] overflow-y-auto">
    <div class="flex justify-between items-start mb-3">
      <h2 id="detail-title" class="text-lg font-bold"></h2>
      <button onclick="closeDetail()" class="text-gray-400 hover:text-white text-xl">&times;</button>
    </div>
    <div id="detail-body" class="grid grid-cols-2 sm:grid-cols-4 gap-3"></div>
  </div>

<script>
  let map, userMarker, planeMarkers = [], userLat, userLon, rangeCircle;
  const ADSB_URL = "/.netlify/functions/adsb-proxy";

  // Plane icon using SVG rotated by heading
  function planeIcon(heading, altitude) {
    const color = altitudeColor(altitude);
    const rotation = heading || 0;
    return L.divIcon({
      className: '',
      html: `<div style="transform:rotate(${rotation}deg);font-size:22px;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.8));color:${color};">✈</div>`,
      iconSize: [24, 24],
      iconAnchor: [12, 12],
    });
  }

  function altitudeColor(alt) {
    if (!alt && alt !== 0) return '#9ca3af';
    const ft = alt * 3.281; // meters to feet
    if (ft < 5000) return '#22c55e';   // green — low
    if (ft < 15000) return '#eab308';  // yellow — mid
    if (ft < 30000) return '#f97316';  // orange — high
    return '#ef4444';                   // red — cruise
  }

  function metersToFeet(m) { return m ? Math.round(m * 3.281).toLocaleString() : '—'; }
  function msToKnots(ms) { return ms ? Math.round(ms * 1.944) : '—'; }
  function msToFpm(ms) { return ms ? Math.round(ms * 196.85).toLocaleString() : '—'; }

  function milesToDeg(miles) { return miles / 69; }

  // Initialize map
  function initMap(lat, lon) {
    map = L.map('map', { zoomControl: false }).setView([lat, lon], 10);
    L.control.zoom({ position: 'topright' }).addTo(map);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://carto.com/">CARTO</a> | Data: <a href="https://adsb.lol">ADS-B Exchange (adsb.lol)</a>',
      maxZoom: 18,
    }).addTo(map);

    // User marker
    userMarker = L.circleMarker([lat, lon], {
      radius: 8, fillColor: '#6366f1', fillOpacity: 1, color: '#fff', weight: 2,
    }).addTo(map).bindPopup('<strong>📍 You are here</strong>');
  }

  // Fetch flights via Netlify proxy → api.adsb.lol
  async function fetchFlights(lat, lon, radiusMi) {
    const url = `${ADSB_URL}?lat=${lat.toFixed(4)}&lon=${lon.toFixed(4)}&dist=${radiusMi}`;

    const res = await fetch(url);
    if (!res.ok) throw new Error(`ADS-B proxy returned ${res.status}`);
    const data = await res.json();
    return (data.ac || []).map(a => ({
      icao24:       a.hex,
      callsign:     (a.flight || a.r || '').trim(),
      country:      a.r || '',
      lon:          a.lon,
      lat:          a.lat,
      altitude:     a.alt_baro === 'ground' ? 0 : (a.alt_baro || a.alt_geom || 0) * 0.3048, // ft→m
      onGround:     a.alt_baro === 'ground' || a.gs === 0,
      velocity:     a.gs ? a.gs * 0.5144 : null, // knots→m/s
      heading:      a.track,
      verticalRate: a.baro_rate ? a.baro_rate * 0.00508 : null, // fpm→m/s
      geoAltitude:  a.alt_geom ? a.alt_geom * 0.3048 : null,
      squawk:       a.squawk,
      category:     a.category,
    }));
  }

  // Render flights on map
  function renderFlights(flights) {
    // Clear old markers
    planeMarkers.forEach(m => map.removeLayer(m));
    planeMarkers = [];

    // Remove range circle
    if (rangeCircle) map.removeLayer(rangeCircle);
    const radiusMi = parseInt(document.getElementById('radius-select').value);
    rangeCircle = L.circle([userLat, userLon], {
      radius: radiusMi * 1609.34, // miles to meters
      color: '#6366f1', fillColor: '#6366f1', fillOpacity: 0.03, weight: 1, dashArray: '5,5',
    }).addTo(map);

    const airborne = flights.filter(f => !f.onGround && f.lat && f.lon);

    for (const f of airborne) {
      const marker = L.marker([f.lat, f.lon], {
        icon: planeIcon(f.heading, f.altitude),
      }).addTo(map);

      marker.on('click', () => showDetail(f));

      // Tooltip on hover
      marker.bindTooltip(f.callsign || f.icao24, {
        permanent: false, direction: 'top', className: 'bg-gray-800 text-white text-xs px-2 py-1 rounded border border-gray-700',
      });

      planeMarkers.push(marker);
    }

    const badge = document.getElementById('status-badge');
    badge.textContent = `${airborne.length} aircraft`;
    badge.className = 'text-xs px-2 py-1 rounded-full bg-green-900/50 text-green-400 border border-green-700';

    document.getElementById('plane-count').textContent = `Updated ${new Date().toLocaleTimeString()}`;
  }

  // Cache aircraft lookups to avoid repeat API calls
  const aircraftCache = {};

  async function lookupAircraft(icao24) {
    if (aircraftCache[icao24]) return aircraftCache[icao24];
    try {
      const res = await fetch(`https://hexdb.io/api/v1/aircraft/${icao24}`);
      if (res.ok) {
        const data = await res.json();
        aircraftCache[icao24] = data;
        return data;
      }
    } catch {}
    return null;
  }

  async function showDetail(f) {
    const panel = document.getElementById('detail-panel');
    document.getElementById('detail-title').textContent = `${f.callsign || 'Unknown'} (${f.icao24})`;

    const vr = f.verticalRate;
    const vrLabel = vr > 0.5 ? '↑ Climbing' : vr < -0.5 ? '↓ Descending' : '→ Level';
    const vrColor = vr > 0.5 ? 'text-green-400' : vr < -0.5 ? 'text-red-400' : 'text-gray-300';

    document.getElementById('detail-body').innerHTML = `
      <div class="col-span-2 sm:col-span-4" id="aircraft-photo-row">
        <div class="flex items-center gap-2 text-gray-500 text-xs"><div class="loader" style="width:20px;height:20px;border-width:2px;"></div> Looking up aircraft...</div>
      </div>
      <div><div class="info-label">Altitude</div><div class="info-value">${metersToFeet(f.altitude)} ft</div></div>
      <div><div class="info-label">Ground Speed</div><div class="info-value">${msToKnots(f.velocity)} kts</div></div>
      <div><div class="info-label">Heading</div><div class="info-value">${f.heading ? Math.round(f.heading) + '°' : '—'}</div></div>
      <div><div class="info-label">Vertical Rate</div><div class="info-value ${vrColor}">${vrLabel} ${msToFpm(Math.abs(f.verticalRate))} fpm</div></div>
      <div><div class="info-label">Country</div><div class="info-value">${f.country || '—'}</div></div>
      <div><div class="info-label">Squawk</div><div class="info-value">${f.squawk || '—'}</div></div>
      <div><div class="info-label">ICAO24</div><div class="info-value font-mono">${f.icao24}</div></div>
      <div><div class="info-label">Geo Altitude</div><div class="info-value">${metersToFeet(f.geoAltitude)} ft</div></div>
      <div id="aircraft-type-row"><div class="info-label">Aircraft Type</div><div class="info-value text-gray-500">Loading...</div></div>
      <div id="aircraft-reg-row"><div class="info-label">Registration</div><div class="info-value text-gray-500">Loading...</div></div>
      <div id="aircraft-owner-row"><div class="info-label">Operator</div><div class="info-value text-gray-500">Loading...</div></div>
    `;
    panel.classList.remove('hidden');

    // Fetch aircraft details async
    const info = await lookupAircraft(f.icao24);
    const photoRow = document.getElementById('aircraft-photo-row');
    const typeRow = document.getElementById('aircraft-type-row');
    const regRow = document.getElementById('aircraft-reg-row');
    const ownerRow = document.getElementById('aircraft-owner-row');

    if (info) {
      const typeName = [info.Manufacturer, info.Type].filter(Boolean).join(' ') || info.ICAOTypeCode || 'Unknown';
      if (typeRow) typeRow.innerHTML = `<div class="info-label">Aircraft Type</div><div class="info-value">${typeName}</div>`;
      if (regRow) regRow.innerHTML = `<div class="info-label">Registration</div><div class="info-value font-mono">${info.Registration || '—'}</div>`;
      if (ownerRow) ownerRow.innerHTML = `<div class="info-label">Operator</div><div class="info-value">${info.RegisteredOwners || '—'}</div>`;

      // Show aircraft photo from planespotters.net
      try {
        const photoRes = await fetch(`https://api.planespotters.net/pub/photos/hex/${f.icao24}`);
        if (photoRes.ok) {
          const photoData = await photoRes.json();
          const photo = photoData.photos && photoData.photos[0];
          if (photo && photoRow) {
            const imgSrc = photo.thumbnail_large ? photo.thumbnail_large.src : photo.thumbnail.src;
            photoRow.innerHTML = `
              <img src="${imgSrc}" alt="${typeName}" class="rounded-lg border border-gray-700 max-h-40 object-cover" />
              <div class="text-xs text-gray-400 mt-1">${typeName}${info.Registration ? ' — ' + info.Registration : ''} · 📷 ${photo.photographer || ''}</div>
            `;
          } else if (photoRow) {
            photoRow.innerHTML = `<div class="text-gray-500 text-xs">${typeName}${info.Registration ? ' — ' + info.Registration : ''} · No photo available</div>`;
          }
        }
      } catch {
        if (photoRow) photoRow.innerHTML = `<div class="text-gray-500 text-xs">${typeName} · No photo available</div>`;
      }
    } else {
      if (photoRow) photoRow.innerHTML = '<div class="text-gray-500 text-xs">Aircraft info unavailable</div>';
      if (typeRow) typeRow.innerHTML = '<div class="info-label">Aircraft Type</div><div class="info-value text-gray-500">—</div>';
      if (regRow) regRow.innerHTML = '<div class="info-label">Registration</div><div class="info-value text-gray-500">—</div>';
      if (ownerRow) ownerRow.innerHTML = '<div class="info-label">Operator</div><div class="info-value text-gray-500">—</div>';
    }
  }

  function closeDetail() {
    document.getElementById('detail-panel').classList.add('hidden');
  }

  async function refresh() {
    const badge = document.getElementById('status-badge');
    badge.textContent = 'Refreshing...';
    badge.className = 'text-xs px-2 py-1 rounded-full bg-yellow-900/50 text-yellow-400 border border-yellow-700';
    try {
      const radiusMi = parseInt(document.getElementById('radius-select').value);
      const flights = await fetchFlights(userLat, userLon, radiusMi);
      renderFlights(flights);
    } catch (err) {
      badge.textContent = 'Error';
      badge.className = 'text-xs px-2 py-1 rounded-full bg-red-900/50 text-red-400 border border-red-700';
      console.error(err);
    }
  }

  // Auto-refresh every 15 seconds
  let autoRefresh;
  function startAutoRefresh() {
    if (autoRefresh) clearInterval(autoRefresh);
    autoRefresh = setInterval(refresh, 15000);
  }

  async function useManualLocation() {
    const lat = parseFloat(document.getElementById('manual-lat').value);
    const lon = parseFloat(document.getElementById('manual-lon').value);
    if (isNaN(lat) || isNaN(lon)) {
      document.getElementById('loading-text').textContent = 'Enter valid lat/lon numbers.';
      return;
    }
    userLat = lat; userLon = lon;
    await startWithLocation();
  }

  async function startWithLocation() {
    const loading = document.getElementById('loading');
    const loadingText = document.getElementById('loading-text');
    document.getElementById('manual-location').classList.add('hidden');
    document.getElementById('loading-spinner').classList.remove('hidden');
    try {
      loadingText.textContent = 'Loading map...';
      initMap(userLat, userLon);
      loadingText.textContent = 'Scanning the skies...';
      const radiusMi = parseInt(document.getElementById('radius-select').value);
      const flights = await fetchFlights(userLat, userLon, radiusMi);
      renderFlights(flights);
      loading.classList.add('hidden');
      startAutoRefresh();
    } catch (err) {
      loadingText.textContent = `Fetch error: ${err.message}`;
      document.getElementById('loading-spinner').classList.add('hidden');
    }
  }

  // Startup
  async function init() {
    const loadingText = document.getElementById('loading-text');
    try {
      loadingText.textContent = 'Getting your location...';
      const pos = await new Promise((resolve, reject) => {
        navigator.geolocation.getCurrentPosition(resolve, reject, {
          enableHighAccuracy: true, timeout: 10000,
        });
      });
      userLat = pos.coords.latitude;
      userLon = pos.coords.longitude;
      await startWithLocation();
    } catch (err) {
      loadingText.textContent = `Location unavailable: ${err.message}`;
      document.getElementById('loading-spinner').classList.add('hidden');
      document.getElementById('manual-location').classList.remove('hidden');
      document.getElementById('manual-location').classList.add('flex');
    }
  }

  // ── UFO Sightings Toggle ──
  let ufoOn = false, ufoMarkers = [], ufoData = null;

  function toggleUFO() {
    ufoOn = !ufoOn;
    const btn = document.getElementById('ufo-toggle');
    if (ufoOn) {
      btn.className = 'px-3 py-1.5 text-xs bg-green-700 hover:bg-green-600 text-white font-medium rounded-lg transition border border-green-500';
      loadUFOData();
    } else {
      btn.className = 'px-3 py-1.5 text-xs bg-gray-800 hover:bg-gray-700 text-gray-300 font-medium rounded-lg transition border border-gray-700';
      clearUFO();
    }
  }

  function clearUFO() {
    ufoMarkers.forEach(m => map.removeLayer(m));
    ufoMarkers = [];
  }

  async function loadUFOData() {
    if (!ufoData) {
      try {
        const res = await fetch('ufo-sightings.json');
        ufoData = await res.json();
      } catch (e) {
        console.error('Failed to load UFO data:', e);
        return;
      }
    }
    renderUFO();
  }

  function renderUFO() {
    clearUFO();
    if (!ufoData || !map || !userLat) return;

    const radiusMi = parseInt(document.getElementById('radius-select').value);
    const maxDeg = radiusMi / 69;
    const shapes = ufoData.s;

    let count = 0;
    for (const d of ufoData.d) {
      const [lat, lon, yearMonth, shapeIdx, city, state] = d;
      if (Math.abs(lat - userLat) > maxDeg || Math.abs(lon - userLon) > maxDeg * 1.3) continue;

      const shape = shapes[shapeIdx] || 'unknown';
      const year = Math.floor(yearMonth / 100);
      const month = yearMonth % 100;

      const icon = L.divIcon({
        className: '',
        html: `<div style="font-size:16px;filter:drop-shadow(0 0 6px #22c55e);text-align:center;opacity:0.8;">👽</div>`,
        iconSize: [20, 20],
        iconAnchor: [10, 10],
      });

      const marker = L.marker([lat, lon], { icon, zIndexOffset: -100 }).addTo(map);
      marker.bindTooltip(`${city}, ${state} (${year})`, {
        permanent: false, direction: 'top', className: 'bg-gray-800 text-white text-xs px-2 py-1 rounded border border-gray-700',
      });

      marker.on('click', () => {
        const panel = document.getElementById('detail-panel');
        document.getElementById('detail-title').textContent = `👽 UFO Sighting — ${city}, ${state}`;
        document.getElementById('detail-body').innerHTML = `
          <div><div class="info-label">Date</div><div class="info-value">${month}/${year}</div></div>
          <div><div class="info-label">Shape</div><div class="info-value" style="text-transform:capitalize;">${shape}</div></div>
          <div><div class="info-label">Location</div><div class="info-value">${city}, ${state}</div></div>
          <div><div class="info-label">Source</div><div class="info-value"><a href="https://nuforc.org/ndx/?id=event" target="_blank" class="text-indigo-400 underline">NUFORC</a></div></div>
          <div><div class="info-label">Coordinates</div><div class="info-value">${lat}°, ${lon}°</div></div>
          <div><div class="info-label">Data Note</div><div class="info-value text-gray-400 text-xs">Reports 2000–2014 via NUFORC geocoded archive</div></div>
        `;
        panel.classList.remove('hidden');
      });

      ufoMarkers.push(marker);
      count++;
      if (count >= 500) break; // cap for performance
    }
  }

  // Legend
  window.addEventListener('load', () => {
    init();

    // Add altitude legend to map after init
    setTimeout(() => {
      if (!map) return;
      const legend = L.control({ position: 'bottomleft' });
      legend.onAdd = () => {
        const div = L.DomUtil.create('div', 'bg-gray-900/90 backdrop-blur border border-gray-700 rounded-lg p-3 text-xs');
        div.innerHTML = `
          <div class="font-semibold text-gray-200 mb-1.5">Altitude</div>
          <div class="flex flex-col gap-1">
            <div class="flex items-center gap-2"><span style="color:#22c55e">✈</span> <span class="text-gray-300">&lt; 5,000 ft</span></div>
            <div class="flex items-center gap-2"><span style="color:#eab308">✈</span> <span class="text-gray-300">5k–15k ft</span></div>
            <div class="flex items-center gap-2"><span style="color:#f97316">✈</span> <span class="text-gray-300">15k–30k ft</span></div>
            <div class="flex items-center gap-2"><span style="color:#ef4444">✈</span> <span class="text-gray-300">&gt; 30,000 ft</span></div>
          </div>
          <div class="font-semibold text-gray-200 mt-2 mb-1.5">👽 UFO Sightings</div>
          <div class="text-gray-400">NUFORC reports (2000–2014)</div>
        `;
        return div;
      };
      legend.addTo(map);
    }, 500);
  });
</script>
</body>
</html>
