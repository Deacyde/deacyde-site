<!DOCTYPE html>
<html>
<head>
    <title>Starlight VM - Enable Sudo</title>
    <style>
        body { font-family: monospace; padding: 40px; background: #1e1e1e; color: #00ff00; }
        .command { background: #000; padding: 20px; border: 2px solid #00ff00; margin: 20px 0; cursor: pointer; }
        .command:hover { border-color: #00ff88; }
        pre { margin: 0; white-space: pre-wrap; word-wrap: break-word; user-select: all; }
        h1 { color: #00ff00; }
        h2 { color: #ffaa00; }
        p { color: #00ff00; }
    </style>
</head>
<body>
    <h1>🌟 Starlight VM - Enable Passwordless Sudo</h1>
    <p>Run this ONE command in Starlight VM console:</p>
    
    <div class="command" onclick="selectText(this)">
        <pre>echo "starlight ALL=(ALL) NOPASSWD:ALL" | sudo tee /etc/sudoers.d/starlight && sudo chmod 440 /etc/sudoers.d/starlight</pre>
    </div>
    
    <p>✅ After running, tell Copilot: <strong>"sudo enabled"</strong></p>
    
    <script>
        function selectText(element) {
            const range = document.createRange();
            range.selectNodeContents(element.querySelector('pre'));
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);
        }
    </script>
</body>
</html>
